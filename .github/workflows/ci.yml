name: CI

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

jobs:
  gate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v5
        with:
          node-version: 20
      - name: Install xmllint
        run: sudo apt-get update && sudo apt-get install -y libxml2-utils

      - name: Contrast — every profile must pass WCAG AA
        run: |
          for p in profiles/*/; do
            echo "::group::contrast $p"
            node tooling/contrast-check.mjs "$p"
            echo "::endgroup::"
          done

      - name: Token build is reproducible (no drift between tokens.json and generated files)
        run: |
          for p in profiles/*/; do p="${p%/}"
            node tooling/build-tokens.mjs "$p/tokens.json" "$p/brand.css" --md "$p/color-system.md"
          done
          git diff --exit-code -- 'profiles/*/brand.css' 'profiles/*/color-system.md' \
            || { echo "::error::Generated CSS/table is out of sync with tokens.json — run build-tokens and commit."; exit 1; }

      - name: Lint — clean sample passes
        run: |
          node tooling/lint.mjs profiles/northwind/sample.html profiles/northwind
          node tooling/lint.mjs profiles/graphite/sample.html profiles/graphite

      - name: Lint — every template passes against northwind
        run: |
          for t in templates/*.html; do
            echo "::group::lint $t"
            node tooling/lint.mjs "$t" profiles/northwind
            echo "::endgroup::"
          done

      - name: Lint — the deliberately bad artifact must FAIL (exit exactly 1)
        run: |
          set +e
          node tooling/lint.mjs examples/bad.html profiles/northwind
          code=$?
          set -e
          if [ "$code" -ne 1 ]; then
            echo "::error::expected lint to exit 1 on examples/bad.html, got $code — the gate is not biting (a crash or missing file must not pass)."
            exit 1
          fi
          echo "bad.html correctly rejected (exit 1)."

      - name: Diagrams are well-formed XML
        run: xmllint --noout diagrams/*.svg

      - name: Diagrams — no hardcoded hex in fill/stroke attributes
        # The shared :root <style> block (--var: #hex definitions) is the one
        # legitimate home for hex in a diagram; fill=/stroke= must use var(--…).
        run: |
          if grep -nE '(fill|stroke)="#' diagrams/*.svg; then
            echo "::error::Hardcoded hex in a fill=/stroke= attribute — tokenize with tooling/tokenize-svg.mjs."
            exit 1
          fi
          echo "No hardcoded fill/stroke hex in diagrams."
