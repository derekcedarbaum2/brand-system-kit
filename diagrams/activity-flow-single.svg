<?xml version="1.0" encoding="UTF-8"?>
<!--
  TEMPLATE: UML 2.x Activity Flow — Single Track
  Required Figma fonts: JetBrains Mono (700) for headlines/labels, Inter (400, 700) for body.
  Use for sequential processes with one primary actor or unified flow. For parallel actors use activity-flow-swimlanes.svg.
  Default canvas: 1200 × 1400. Add/remove activity boxes by shifting y by ~120 px each.
-->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 1400">
<style>:root{
  --ink: #161a19;
  --body: #353b3a;
  --secondary: #5c6463;
  --dim: #6e7574;
  --accent: #1f6e7a;
  --accent-light: #cfe0e2;
  --accent-2: #3e5c8a;
  --teal: #2a7d8a;
  --warm: #8a6d1f;
  --positive: #2e7d4f;
  --emphasis: #9a2d2d;
  --bg: #fbfaf7;
  --card: #f0eee8;
  --card-accent: #e6eef0;
  --border: #e3e0d8;
}</style>
  <title>{Topic} — Activity Flow</title>
  <desc>Sequential activity diagram (UML 2.x) with start/end nodes, activities, and decision diamonds.</desc>

  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="9" markerHeight="9" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="var(--body)"/>
    </marker>
  </defs>

  <g id="background">
    <rect x="0" y="0" width="1200" height="1400" fill="var(--bg)"/>
  </g>

  <g id="header">
    <text id="title" x="60" y="56" font-size="26" font-weight="700" fill="var(--ink)" font-family="'JetBrains Mono', ui-monospace, SFMono-Regular, Menlo, monospace" letter-spacing="0.8">{TOPIC} ACTIVITY FLOW</text>
    <text id="subtitle" x="60" y="82" font-size="13" fill="var(--secondary)" font-family="'Inter', -apple-system, BlinkMacSystemFont, 'Helvetica Neue', Helvetica, Arial, sans-serif">{Source anchor — e.g., "PRD §X.Y"}</text>
  </g>

  <g id="start-node">
    <circle cx="600" cy="160" r="12" fill="var(--ink)"/>
    <text x="630" y="165" font-size="13" font-weight="700" fill="var(--ink)" font-family="'Inter', -apple-system, BlinkMacSystemFont, 'Helvetica Neue', Helvetica, Arial, sans-serif">{Start label}</text>
    <line x1="600" y1="172" x2="600" y2="220" stroke="var(--body)" stroke-width="1.5" marker-end="url(#arrow)"/>
  </g>

  <g id="activity-1">
    <rect x="380" y="230" width="440" height="80" rx="6" fill="var(--bg)" stroke="var(--body)" stroke-width="1.5"/>
    <text x="600" y="256" font-size="14" font-weight="700" fill="var(--ink)" text-anchor="middle" font-family="'Inter', -apple-system, BlinkMacSystemFont, 'Helvetica Neue', Helvetica, Arial, sans-serif">{Activity 1 — short verb phrase}</text>
    <text x="600" y="278" font-size="11" fill="var(--body)" text-anchor="middle" font-family="'Inter', -apple-system, BlinkMacSystemFont, 'Helvetica Neue', Helvetica, Arial, sans-serif">{Optional one-line detail}</text>
  </g>
  <line x1="600" y1="310" x2="600" y2="350" stroke="var(--body)" stroke-width="1.5" marker-end="url(#arrow)"/>

  <g id="decision-1">
    <polygon points="600,360 720,440 600,520 480,440" fill="var(--card)" stroke="var(--accent)" stroke-width="2.5"/>
    <text x="600" y="430" font-size="12" font-weight="700" fill="var(--ink)" text-anchor="middle" font-family="'JetBrains Mono', ui-monospace, SFMono-Regular, Menlo, monospace" letter-spacing="0.5">{DECISION QUESTION}</text>
    <text x="600" y="450" font-size="10" font-style="italic" fill="var(--secondary)" text-anchor="middle" font-family="'Inter', -apple-system, BlinkMacSystemFont, 'Helvetica Neue', Helvetica, Arial, sans-serif">[guard condition?]</text>
  </g>

  <!-- Two branch paths from decision -->
  <line x1="720" y1="440" x2="900" y2="440" stroke="var(--body)" stroke-width="1.5"/>
  <text x="810" y="432" font-size="10" font-style="italic" fill="var(--body)" text-anchor="middle" font-family="'Inter', -apple-system, BlinkMacSystemFont, 'Helvetica Neue', Helvetica, Arial, sans-serif">[branch A guard]</text>
  <line x1="480" y1="440" x2="300" y2="440" stroke="var(--body)" stroke-width="1.5"/>
  <text x="390" y="432" font-size="10" font-style="italic" fill="var(--body)" text-anchor="middle" font-family="'Inter', -apple-system, BlinkMacSystemFont, 'Helvetica Neue', Helvetica, Arial, sans-serif">[branch B guard]</text>

  <!-- Branch A activity -->
  <g id="branch-a-activity">
    <rect x="780" y="400" width="240" height="80" rx="6" fill="var(--bg)" stroke="var(--body)" stroke-width="1.5"/>
    <text x="900" y="436" font-size="13" font-weight="700" fill="var(--ink)" text-anchor="middle" font-family="'Inter', -apple-system, BlinkMacSystemFont, 'Helvetica Neue', Helvetica, Arial, sans-serif">{Branch A activity}</text>
    <text x="900" y="455" font-size="10" fill="var(--body)" text-anchor="middle" font-family="'Inter', -apple-system, BlinkMacSystemFont, 'Helvetica Neue', Helvetica, Arial, sans-serif">{Detail}</text>
  </g>

  <!-- Branch B activity -->
  <g id="branch-b-activity">
    <rect x="180" y="400" width="240" height="80" rx="6" fill="var(--bg)" stroke="var(--body)" stroke-width="1.5"/>
    <text x="300" y="436" font-size="13" font-weight="700" fill="var(--ink)" text-anchor="middle" font-family="'Inter', -apple-system, BlinkMacSystemFont, 'Helvetica Neue', Helvetica, Arial, sans-serif">{Branch B activity}</text>
    <text x="300" y="455" font-size="10" fill="var(--body)" text-anchor="middle" font-family="'Inter', -apple-system, BlinkMacSystemFont, 'Helvetica Neue', Helvetica, Arial, sans-serif">{Detail}</text>
  </g>

  <!-- Rejoin -->
  <path d="M 300 480 L 300 540 L 600 540" fill="none" stroke="var(--body)" stroke-width="1.5"/>
  <path d="M 900 480 L 900 540 L 600 540" fill="none" stroke="var(--body)" stroke-width="1.5"/>
  <line x1="600" y1="540" x2="600" y2="580" stroke="var(--body)" stroke-width="1.5" marker-end="url(#arrow)"/>

  <g id="activity-after-decision">
    <rect x="380" y="590" width="440" height="80" rx="6" fill="var(--bg)" stroke="var(--body)" stroke-width="1.5"/>
    <text x="600" y="616" font-size="14" font-weight="700" fill="var(--ink)" text-anchor="middle" font-family="'Inter', -apple-system, BlinkMacSystemFont, 'Helvetica Neue', Helvetica, Arial, sans-serif">{Next activity after decision rejoin}</text>
  </g>
  <line x1="600" y1="670" x2="600" y2="710" stroke="var(--body)" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- Add more activities by duplicating the activity group and shifting y by ~120 px -->

  <g id="end-node">
    <circle cx="600" cy="730" r="13" fill="var(--bg)" stroke="var(--ink)" stroke-width="2"/>
    <circle cx="600" cy="730" r="7" fill="var(--ink)"/>
    <text x="630" y="735" font-size="13" font-weight="700" fill="var(--ink)" font-family="'Inter', -apple-system, BlinkMacSystemFont, 'Helvetica Neue', Helvetica, Arial, sans-serif">{End label}</text>
  </g>
</svg>
