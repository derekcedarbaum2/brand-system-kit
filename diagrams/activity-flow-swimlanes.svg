<?xml version="1.0" encoding="UTF-8"?>
<!--
  TEMPLATE: UML 2.x Activity Flow — Parallel Swim Lanes
  Required Figma fonts: JetBrains Mono (700) for headlines/labels, Inter (400, 700) for body.
  Use when 2 actors do work concurrently with handoffs. Fork bar starts parallelism, join bar ends it.
  Default canvas: 1300 × 1600. Adjust lane height by stretching content vertically.
-->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1300 1600">
<style>:root{
  --ink: #161a19;
  --body: #353b3a;
  --secondary: #5c6463;
  --dim: #6e7574;
  --accent: #1f6e7a;
  --accent-light: #cfe0e2;
  --accent-2: #3e5c8a;
  --teal: #2a7d8a;
  --warm: #8a6d1f;
  --positive: #2e7d4f;
  --emphasis: #9a2d2d;
  --bg: #fbfaf7;
  --card: #f0eee8;
  --card-accent: #e6eef0;
  --border: #e3e0d8;
}</style>
  <title>{Topic} — Activity Flow with Swim Lanes</title>
  <desc>Two-actor parallel activity diagram (UML 2.x) with fork/join bars marking the parallel section.</desc>

  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="9" markerHeight="9" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="var(--body)"/>
    </marker>
  </defs>

  <g id="background">
    <rect x="0" y="0" width="1300" height="1600" fill="var(--bg)"/>
  </g>

  <g id="header">
    <text id="title" x="60" y="56" font-size="26" font-weight="700" fill="var(--ink)" font-family="'JetBrains Mono', ui-monospace, SFMono-Regular, Menlo, monospace" letter-spacing="0.8">{TOPIC} ACTIVITY FLOW</text>
    <text id="subtitle" x="60" y="82" font-size="13" fill="var(--secondary)" font-family="'Inter', -apple-system, BlinkMacSystemFont, 'Helvetica Neue', Helvetica, Arial, sans-serif">{Subtitle — actors and parallelism</text>
  </g>

  <g id="start-node">
    <circle cx="650" cy="140" r="12" fill="var(--ink)"/>
    <text x="680" y="145" font-size="13" font-weight="700" fill="var(--ink)" font-family="'Inter', -apple-system, BlinkMacSystemFont, 'Helvetica Neue', Helvetica, Arial, sans-serif">{Start label}</text>
    <line x1="650" y1="152" x2="650" y2="195" stroke="var(--body)" stroke-width="1.5" marker-end="url(#arrow)"/>
  </g>

  <g id="phase-banner">
    <rect x="60" y="205" width="1180" height="32" rx="4" fill="var(--teal)"/>
    <text x="80" y="227" font-size="13" font-weight="700" fill="var(--bg)" letter-spacing="2" font-family="'JetBrains Mono', ui-monospace, SFMono-Regular, Menlo, monospace">{PHASE NAME — PARALLEL SECTION}</text>
  </g>

  <g id="fork-bar">
    <rect x="380" y="255" width="540" height="6" fill="var(--ink)"/>
    <text x="930" y="263" font-size="10" font-style="italic" fill="var(--secondary)" font-family="'Inter', -apple-system, BlinkMacSystemFont, 'Helvetica Neue', Helvetica, Arial, sans-serif">fork — two tracks run concurrent</text>
  </g>

  <g id="lane-headers">
    <rect x="80" y="275" width="540" height="32" rx="4" fill="var(--card)" stroke="var(--border)"/>
    <text x="350" y="297" font-size="11" font-weight="700" fill="var(--ink)" letter-spacing="1.5" text-anchor="middle" font-family="'JetBrains Mono', ui-monospace, SFMono-Regular, Menlo, monospace">LANE A — {ACTOR 1}</text>
    <rect x="680" y="275" width="540" height="32" rx="4" fill="var(--card)" stroke="var(--border)"/>
    <text x="950" y="297" font-size="11" font-weight="700" fill="var(--ink)" letter-spacing="1.5" text-anchor="middle" font-family="'JetBrains Mono', ui-monospace, SFMono-Regular, Menlo, monospace">LANE B — {ACTOR 2}</text>
  </g>

  <g id="lane-a-content">
    <rect id="lane-a-bg" x="80" y="315" width="540" height="900" rx="4" fill="var(--card)" stroke="var(--border)" opacity="0.5"/>
    <g id="lane-a-activity-1">
      <rect x="100" y="345" width="500" height="100" rx="6" fill="var(--bg)" stroke="var(--body)" stroke-width="1.5"/>
      <text x="350" y="372" font-size="14" font-weight="700" fill="var(--ink)" text-anchor="middle" font-family="'Inter', -apple-system, BlinkMacSystemFont, 'Helvetica Neue', Helvetica, Arial, sans-serif">{Lane A — Activity 1}</text>
      <text x="350" y="395" font-size="11" fill="var(--body)" text-anchor="middle" font-family="'Inter', -apple-system, BlinkMacSystemFont, 'Helvetica Neue', Helvetica, Arial, sans-serif">{Details for what this actor does}</text>
    </g>
    <line x1="350" y1="445" x2="350" y2="535" stroke="var(--body)" stroke-width="1.5" marker-end="url(#arrow)"/>
    <g id="lane-a-activity-2">
      <rect x="100" y="545" width="500" height="100" rx="6" fill="var(--bg)" stroke="var(--body)" stroke-width="1.5"/>
      <text x="350" y="572" font-size="14" font-weight="700" fill="var(--ink)" text-anchor="middle" font-family="'Inter', -apple-system, BlinkMacSystemFont, 'Helvetica Neue', Helvetica, Arial, sans-serif">{Lane A — Activity 2}</text>
      <text x="350" y="595" font-size="11" fill="var(--body)" text-anchor="middle" font-family="'Inter', -apple-system, BlinkMacSystemFont, 'Helvetica Neue', Helvetica, Arial, sans-serif">{Details}</text>
    </g>
    <line x1="350" y1="645" x2="350" y2="1195" stroke="var(--body)" stroke-width="1.5" stroke-dasharray="3,2"/>
  </g>

  <g id="lane-b-content">
    <rect id="lane-b-bg" x="680" y="315" width="540" height="900" rx="4" fill="var(--card)" stroke="var(--border)" opacity="0.5"/>
    <g id="lane-b-activity-1">
      <rect x="700" y="345" width="500" height="100" rx="6" fill="var(--bg)" stroke="var(--teal)" stroke-width="2"/>
      <text x="950" y="372" font-size="14" font-weight="700" fill="var(--ink)" text-anchor="middle" font-family="'Inter', -apple-system, BlinkMacSystemFont, 'Helvetica Neue', Helvetica, Arial, sans-serif">{Lane B — Activity 1}</text>
      <text x="950" y="395" font-size="11" fill="var(--body)" text-anchor="middle" font-family="'Inter', -apple-system, BlinkMacSystemFont, 'Helvetica Neue', Helvetica, Arial, sans-serif">{Details}</text>
    </g>
    <line x1="950" y1="445" x2="950" y2="535" stroke="var(--body)" stroke-width="1.5" marker-end="url(#arrow)"/>
    <g id="lane-b-activity-2">
      <rect x="700" y="545" width="500" height="100" rx="6" fill="var(--bg)" stroke="var(--teal)" stroke-width="2"/>
      <text x="950" y="572" font-size="14" font-weight="700" fill="var(--ink)" text-anchor="middle" font-family="'Inter', -apple-system, BlinkMacSystemFont, 'Helvetica Neue', Helvetica, Arial, sans-serif">{Lane B — Activity 2}</text>
      <text x="950" y="595" font-size="11" fill="var(--body)" text-anchor="middle" font-family="'Inter', -apple-system, BlinkMacSystemFont, 'Helvetica Neue', Helvetica, Arial, sans-serif">{Details}</text>
    </g>
    <line x1="950" y1="645" x2="950" y2="1195" stroke="var(--body)" stroke-width="1.5"/>
  </g>

  <g id="join-bar">
    <rect x="380" y="1205" width="540" height="6" fill="var(--ink)"/>
    <text x="930" y="1213" font-size="10" font-style="italic" fill="var(--secondary)" font-family="'Inter', -apple-system, BlinkMacSystemFont, 'Helvetica Neue', Helvetica, Arial, sans-serif">join — tracks converge</text>
  </g>
  <line x1="650" y1="1211" x2="650" y2="1255" stroke="var(--body)" stroke-width="1.5" marker-end="url(#arrow)"/>

  <g id="post-join-activity">
    <rect x="430" y="1265" width="440" height="80" rx="6" fill="var(--bg)" stroke="var(--body)" stroke-width="1.5"/>
    <text x="650" y="1291" font-size="14" font-weight="700" fill="var(--ink)" text-anchor="middle" font-family="'Inter', -apple-system, BlinkMacSystemFont, 'Helvetica Neue', Helvetica, Arial, sans-serif">{Post-join activity}</text>
    <text x="650" y="1311" font-size="11" fill="var(--body)" text-anchor="middle" font-family="'Inter', -apple-system, BlinkMacSystemFont, 'Helvetica Neue', Helvetica, Arial, sans-serif">{Single-track activity after both lanes converge}</text>
  </g>
  <line x1="650" y1="1345" x2="650" y2="1395" stroke="var(--body)" stroke-width="1.5" marker-end="url(#arrow)"/>

  <g id="end-node">
    <circle cx="650" cy="1410" r="13" fill="var(--bg)" stroke="var(--ink)" stroke-width="2"/>
    <circle cx="650" cy="1410" r="7" fill="var(--ink)"/>
    <text x="680" y="1415" font-size="13" font-weight="700" fill="var(--ink)" font-family="'Inter', -apple-system, BlinkMacSystemFont, 'Helvetica Neue', Helvetica, Arial, sans-serif">{End label}</text>
  </g>
</svg>
