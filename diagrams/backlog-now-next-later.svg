<?xml version="1.0" encoding="UTF-8"?>
<!--
  TEMPLATE: Backlog (Now / Next / Later)
  Required fonts: JetBrains Mono (500-700), Inter (400-700). {{COMPANY}} brand.
  Three columns of decreasing certainty. Items as cards within columns.
-->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1400 900">
<style>:root{
  --ink: #161a19;
  --body: #353b3a;
  --secondary: #5c6463;
  --dim: #6e7574;
  --accent: #1f6e7a;
  --accent-light: #cfe0e2;
  --accent-2: #3e5c8a;
  --teal: #2a7d8a;
  --warm: #8a6d1f;
  --positive: #2e7d4f;
  --emphasis: #9a2d2d;
  --bg: #fbfaf7;
  --card: #f0eee8;
  --card-accent: #e6eef0;
  --border: #e3e0d8;
}</style>
  <title>{Product} — Now / Next / Later</title>
  <desc>Three-column backlog showing what's actively in progress (Now), what's on deck (Next), and what's parked (Later). Reduces calendar precision pressure on long-horizon items.</desc>

  <g id="background"><rect x="0" y="0" width="1400" height="900" fill="var(--bg)"/></g>

  <g id="header">
    <text x="60" y="56" font-size="26" font-weight="700" fill="var(--ink)" font-family="'JetBrains Mono', ui-monospace, SFMono-Regular, Menlo, monospace" letter-spacing="0.8">{PRODUCT} — NOW / NEXT / LATER</text>
    <text x="60" y="82" font-size="13" fill="var(--secondary)" font-family="'Inter', -apple-system, BlinkMacSystemFont, 'Helvetica Neue', Helvetica, Arial, sans-serif">As of {date}. Certainty decreases left → right. No calendar dates beyond Now.</text>
  </g>

  <g id="now-column">
    <rect x="60" y="120" width="430" height="700" rx="6" fill="var(--card-accent)" stroke="var(--accent)" stroke-width="2"/>
    <rect x="60" y="120" width="430" height="40" rx="6" fill="var(--accent)"/>
    <text x="275" y="146" font-size="14" font-weight="700" fill="var(--bg)" letter-spacing="1.5" text-anchor="middle" font-family="'JetBrains Mono', ui-monospace, SFMono-Regular, Menlo, monospace">NOW — IN PROGRESS</text>

    <rect x="80" y="180" width="390" height="80" rx="4" fill="var(--bg)" stroke="var(--accent)"/>
    <text x="100" y="202" font-size="13" font-weight="700" fill="var(--ink)" font-family="'Inter', -apple-system, BlinkMacSystemFont, 'Helvetica Neue', Helvetica, Arial, sans-serif">{Initiative 1}</text>
    <text x="100" y="222" font-size="10" fill="var(--secondary)" font-family="'Inter', -apple-system, BlinkMacSystemFont, 'Helvetica Neue', Helvetica, Arial, sans-serif">{Outcome / hypothesis}</text>
    <text x="100" y="244" font-size="10" font-weight="700" fill="var(--accent)" font-family="'JetBrains Mono', ui-monospace, SFMono-Regular, Menlo, monospace" letter-spacing="0.5">OWNER • TARGET DATE</text>

    <rect x="80" y="280" width="390" height="80" rx="4" fill="var(--bg)" stroke="var(--accent)"/>
    <text x="100" y="302" font-size="13" font-weight="700" fill="var(--ink)" font-family="'Inter', -apple-system, BlinkMacSystemFont, 'Helvetica Neue', Helvetica, Arial, sans-serif">{Initiative 2}</text>
    <text x="100" y="322" font-size="10" fill="var(--secondary)" font-family="'Inter', -apple-system, BlinkMacSystemFont, 'Helvetica Neue', Helvetica, Arial, sans-serif">{Outcome}</text>

    <rect x="80" y="380" width="390" height="80" rx="4" fill="var(--bg)" stroke="var(--accent)"/>
    <text x="100" y="402" font-size="13" font-weight="700" fill="var(--ink)" font-family="'Inter', -apple-system, BlinkMacSystemFont, 'Helvetica Neue', Helvetica, Arial, sans-serif">{Initiative 3}</text>
  </g>

  <g id="next-column">
    <rect x="510" y="120" width="430" height="700" rx="6" fill="var(--card-accent)" stroke="var(--teal)" stroke-width="2"/>
    <rect x="510" y="120" width="430" height="40" rx="6" fill="var(--teal)"/>
    <text x="725" y="146" font-size="14" font-weight="700" fill="var(--bg)" letter-spacing="1.5" text-anchor="middle" font-family="'JetBrains Mono', ui-monospace, SFMono-Regular, Menlo, monospace">NEXT — ON DECK</text>

    <rect x="530" y="180" width="390" height="80" rx="4" fill="var(--bg)" stroke="var(--teal)"/>
    <text x="550" y="202" font-size="13" font-weight="700" fill="var(--ink)" font-family="'Inter', -apple-system, BlinkMacSystemFont, 'Helvetica Neue', Helvetica, Arial, sans-serif">{Initiative A}</text>
    <text x="550" y="222" font-size="10" fill="var(--secondary)" font-family="'Inter', -apple-system, BlinkMacSystemFont, 'Helvetica Neue', Helvetica, Arial, sans-serif">{Outcome / hypothesis}</text>
    <text x="550" y="244" font-size="10" font-weight="700" fill="var(--teal)" font-family="'JetBrains Mono', ui-monospace, SFMono-Regular, Menlo, monospace" letter-spacing="0.5">QUARTER ESTIMATE • DEPENDENCIES</text>

    <rect x="530" y="280" width="390" height="80" rx="4" fill="var(--bg)" stroke="var(--teal)"/>
    <text x="550" y="302" font-size="13" font-weight="700" fill="var(--ink)" font-family="'Inter', -apple-system, BlinkMacSystemFont, 'Helvetica Neue', Helvetica, Arial, sans-serif">{Initiative B}</text>

    <rect x="530" y="380" width="390" height="80" rx="4" fill="var(--bg)" stroke="var(--teal)"/>
    <text x="550" y="402" font-size="13" font-weight="700" fill="var(--ink)" font-family="'Inter', -apple-system, BlinkMacSystemFont, 'Helvetica Neue', Helvetica, Arial, sans-serif">{Initiative C}</text>

    <rect x="530" y="480" width="390" height="80" rx="4" fill="var(--bg)" stroke="var(--teal)"/>
    <text x="550" y="502" font-size="13" font-weight="700" fill="var(--ink)" font-family="'Inter', -apple-system, BlinkMacSystemFont, 'Helvetica Neue', Helvetica, Arial, sans-serif">{Initiative D}</text>
  </g>

  <g id="later-column">
    <rect x="960" y="120" width="380" height="700" rx="6" fill="var(--card)" stroke="var(--dim)" stroke-width="2"/>
    <rect x="960" y="120" width="380" height="40" rx="6" fill="var(--dim)"/>
    <text x="1150" y="146" font-size="14" font-weight="700" fill="var(--bg)" letter-spacing="1.5" text-anchor="middle" font-family="'JetBrains Mono', ui-monospace, SFMono-Regular, Menlo, monospace">LATER — PARKED</text>

    <rect x="980" y="180" width="340" height="60" rx="4" fill="var(--bg)" stroke="var(--dim)"/>
    <text x="1000" y="202" font-size="12" font-weight="700" fill="var(--ink)" font-family="'Inter', -apple-system, BlinkMacSystemFont, 'Helvetica Neue', Helvetica, Arial, sans-serif">{Idea X}</text>
    <text x="1000" y="222" font-size="10" fill="var(--secondary)" font-family="'Inter', -apple-system, BlinkMacSystemFont, 'Helvetica Neue', Helvetica, Arial, sans-serif">{Brief outcome description}</text>

    <rect x="980" y="260" width="340" height="60" rx="4" fill="var(--bg)" stroke="var(--dim)"/>
    <text x="1000" y="282" font-size="12" font-weight="700" fill="var(--ink)" font-family="'Inter', -apple-system, BlinkMacSystemFont, 'Helvetica Neue', Helvetica, Arial, sans-serif">{Idea Y}</text>

    <rect x="980" y="340" width="340" height="60" rx="4" fill="var(--bg)" stroke="var(--dim)"/>
    <text x="1000" y="362" font-size="12" font-weight="700" fill="var(--ink)" font-family="'Inter', -apple-system, BlinkMacSystemFont, 'Helvetica Neue', Helvetica, Arial, sans-serif">{Idea Z}</text>

    <rect x="980" y="420" width="340" height="60" rx="4" fill="var(--bg)" stroke="var(--dim)"/>
    <text x="1000" y="442" font-size="12" font-weight="700" fill="var(--ink)" font-family="'Inter', -apple-system, BlinkMacSystemFont, 'Helvetica Neue', Helvetica, Arial, sans-serif">{Idea AA}</text>
  </g>

  <g id="footer">
    <rect x="60" y="840" width="1280" height="40" rx="4" fill="var(--card)" stroke="var(--border)"/>
    <text x="80" y="864" font-size="11" fill="var(--body)" font-family="'Inter', -apple-system, BlinkMacSystemFont, 'Helvetica Neue', Helvetica, Arial, sans-serif">Now = committed with target date • Next = quarter-level estimate, may shift • Later = no commit, ideas parked for review</text>
  </g>
</svg>
