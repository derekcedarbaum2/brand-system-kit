<?xml version="1.0" encoding="UTF-8"?>
<!--
  TEMPLATE (skeleton): C4 Level 2 — Container Diagram
  Required Figma fonts: JetBrains Mono (700) for headlines/labels, Inter (400, 700) for body.
  Zoom into one system from the L1 Context diagram. Show containers (web app, database, queue, etc.) inside the system boundary.
  Default canvas: 1400 × 1000. Extend by adding more container groups inside the system boundary.
-->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1400 1000">
<style>:root{
  --ink: #161a19;
  --body: #353b3a;
  --secondary: #5c6463;
  --dim: #6e7574;
  --accent: #1f6e7a;
  --accent-light: #cfe0e2;
  --accent-2: #3e5c8a;
  --teal: #2a7d8a;
  --warm: #8a6d1f;
  --positive: #2e7d4f;
  --emphasis: #9a2d2d;
  --bg: #fbfaf7;
  --card: #f0eee8;
  --card-accent: #e6eef0;
  --border: #e3e0d8;
}</style>
  <title>{System Name} — Container Diagram (C4 L2)</title>
  <desc>C4 Level 2 zoom-in: containers inside the system boundary, externals at the edges, technology choices labeled.</desc>

  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="9" markerHeight="9" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="var(--body)"/>
    </marker>
  </defs>

  <g id="background">
    <rect x="0" y="0" width="1400" height="1000" fill="var(--bg)"/>
  </g>

  <g id="header">
    <text id="title" x="60" y="56" font-size="26" font-weight="700" fill="var(--ink)" font-family="'JetBrains Mono', ui-monospace, SFMono-Regular, Menlo, monospace" letter-spacing="0.8">{SYSTEM NAME} — CONTAINERS (C4 L2)</text>
    <text id="subtitle" x="60" y="82" font-size="13" fill="var(--secondary)" font-family="'Inter', -apple-system, BlinkMacSystemFont, 'Helvetica Neue', Helvetica, Arial, sans-serif">{Source anchor — e.g., "Architecture review v1"}</text>
  </g>

  <g id="external-actor-left">
    <rect x="60" y="200" width="200" height="100" rx="6" fill="var(--card)" stroke="var(--body)" stroke-width="1.5"/>
    <text x="76" y="220" font-size="9" font-weight="700" fill="var(--secondary)" letter-spacing="1.5" font-family="'JetBrains Mono', ui-monospace, SFMono-Regular, Menlo, monospace">[PERSON / EXTERNAL]</text>
    <text x="76" y="244" font-size="14" font-weight="700" fill="var(--ink)" font-family="'Inter', -apple-system, BlinkMacSystemFont, 'Helvetica Neue', Helvetica, Arial, sans-serif">{External actor / system}</text>
    <text x="76" y="262" font-size="10" fill="var(--secondary)" font-family="'Inter', -apple-system, BlinkMacSystemFont, 'Helvetica Neue', Helvetica, Arial, sans-serif">{Description}</text>
  </g>

  <g id="system-boundary">
    <rect x="320" y="160" width="760" height="640" rx="8" fill="var(--card)" stroke="var(--accent)" stroke-width="2.5" stroke-dasharray="8,4"/>
    <text x="340" y="184" font-size="11" font-weight="700" fill="var(--accent)" letter-spacing="1.5" font-family="'JetBrains Mono', ui-monospace, SFMono-Regular, Menlo, monospace">{SYSTEM NAME} — SYSTEM BOUNDARY</text>

    <g id="container-frontend">
      <rect x="360" y="220" width="280" height="110" rx="6" fill="var(--bg)" stroke="var(--teal)" stroke-width="2"/>
      <text x="376" y="242" font-size="9" font-weight="700" fill="var(--teal)" letter-spacing="1.5" font-family="'JetBrains Mono', ui-monospace, SFMono-Regular, Menlo, monospace">[CONTAINER: WEB APP]</text>
      <text x="376" y="266" font-size="14" font-weight="700" fill="var(--ink)" font-family="'Inter', -apple-system, BlinkMacSystemFont, 'Helvetica Neue', Helvetica, Arial, sans-serif">{Frontend container}</text>
      <text x="376" y="284" font-size="10" fill="var(--secondary)" font-family="'Inter', -apple-system, BlinkMacSystemFont, 'Helvetica Neue', Helvetica, Arial, sans-serif">[Tech: e.g., Electron + React]</text>
      <text x="376" y="306" font-size="10" fill="var(--body)" font-family="'Inter', -apple-system, BlinkMacSystemFont, 'Helvetica Neue', Helvetica, Arial, sans-serif">{What this container does}</text>
    </g>

    <g id="container-backend">
      <rect x="760" y="220" width="280" height="110" rx="6" fill="var(--bg)" stroke="var(--teal)" stroke-width="2"/>
      <text x="776" y="242" font-size="9" font-weight="700" fill="var(--teal)" letter-spacing="1.5" font-family="'JetBrains Mono', ui-monospace, SFMono-Regular, Menlo, monospace">[CONTAINER: API]</text>
      <text x="776" y="266" font-size="14" font-weight="700" fill="var(--ink)" font-family="'Inter', -apple-system, BlinkMacSystemFont, 'Helvetica Neue', Helvetica, Arial, sans-serif">{Backend container}</text>
      <text x="776" y="284" font-size="10" fill="var(--secondary)" font-family="'Inter', -apple-system, BlinkMacSystemFont, 'Helvetica Neue', Helvetica, Arial, sans-serif">[Tech: e.g., Flask / Python]</text>
      <text x="776" y="306" font-size="10" fill="var(--body)" font-family="'Inter', -apple-system, BlinkMacSystemFont, 'Helvetica Neue', Helvetica, Arial, sans-serif">{What this container does}</text>
    </g>

    <g id="container-database">
      <rect x="560" y="380" width="280" height="100" rx="6" fill="var(--card)" stroke="var(--accent)" stroke-width="2"/>
      <text x="576" y="402" font-size="9" font-weight="700" fill="var(--accent)" letter-spacing="1.5" font-family="'JetBrains Mono', ui-monospace, SFMono-Regular, Menlo, monospace">[CONTAINER: DATABASE]</text>
      <text x="576" y="426" font-size="14" font-weight="700" fill="var(--ink)" font-family="'Inter', -apple-system, BlinkMacSystemFont, 'Helvetica Neue', Helvetica, Arial, sans-serif">{Data store}</text>
      <text x="576" y="444" font-size="10" fill="var(--secondary)" font-family="'Inter', -apple-system, BlinkMacSystemFont, 'Helvetica Neue', Helvetica, Arial, sans-serif">[Tech: e.g., Postgres + SQLite]</text>
      <text x="576" y="466" font-size="10" fill="var(--body)" font-family="'Inter', -apple-system, BlinkMacSystemFont, 'Helvetica Neue', Helvetica, Arial, sans-serif">{What's stored here}</text>
    </g>

    <g id="container-export-service">
      <rect x="360" y="540" width="680" height="100" rx="6" fill="var(--bg)" stroke="var(--teal)" stroke-width="2"/>
      <text x="376" y="562" font-size="9" font-weight="700" fill="var(--teal)" letter-spacing="1.5" font-family="'JetBrains Mono', ui-monospace, SFMono-Regular, Menlo, monospace">[CONTAINER: EXPORT / INTEGRATION]</text>
      <text x="376" y="586" font-size="14" font-weight="700" fill="var(--ink)" font-family="'Inter', -apple-system, BlinkMacSystemFont, 'Helvetica Neue', Helvetica, Arial, sans-serif">{Export / integration container}</text>
      <text x="376" y="604" font-size="10" fill="var(--secondary)" font-family="'Inter', -apple-system, BlinkMacSystemFont, 'Helvetica Neue', Helvetica, Arial, sans-serif">[Tech: file producer + transfer protocol]</text>
      <text x="376" y="626" font-size="10" fill="var(--body)" font-family="'Inter', -apple-system, BlinkMacSystemFont, 'Helvetica Neue', Helvetica, Arial, sans-serif">{Bridges system to downstream consumers}</text>
    </g>
  </g>

  <g id="external-actor-right">
    <rect x="1140" y="200" width="200" height="100" rx="6" fill="var(--card)" stroke="var(--body)" stroke-width="1.5"/>
    <text x="1156" y="220" font-size="9" font-weight="700" fill="var(--secondary)" letter-spacing="1.5" font-family="'JetBrains Mono', ui-monospace, SFMono-Regular, Menlo, monospace">[DOWNSTREAM SYSTEM]</text>
    <text x="1156" y="244" font-size="14" font-weight="700" fill="var(--ink)" font-family="'Inter', -apple-system, BlinkMacSystemFont, 'Helvetica Neue', Helvetica, Arial, sans-serif">{Consumer system}</text>
    <text x="1156" y="262" font-size="10" fill="var(--secondary)" font-family="'Inter', -apple-system, BlinkMacSystemFont, 'Helvetica Neue', Helvetica, Arial, sans-serif">{Description}</text>
  </g>

  <g id="connections" font-family="'Inter', -apple-system, BlinkMacSystemFont, 'Helvetica Neue', Helvetica, Arial, sans-serif">
    <line x1="260" y1="270" x2="360" y2="270" stroke="var(--body)" stroke-width="1.5" marker-end="url(#arrow)"/>
    <text x="310" y="262" font-size="9" fill="var(--body)" text-anchor="middle">{interaction}</text>
    <line x1="640" y1="270" x2="760" y2="270" stroke="var(--body)" stroke-width="1.5" marker-end="url(#arrow)"/>
    <text x="700" y="262" font-size="9" fill="var(--body)" text-anchor="middle">[HTTP / IPC]</text>
    <line x1="900" y1="330" x2="800" y2="380" stroke="var(--body)" stroke-width="1.5" marker-end="url(#arrow)"/>
    <text x="855" y="362" font-size="9" fill="var(--body)" text-anchor="middle">[reads / writes]</text>
    <line x1="500" y1="380" x2="500" y2="540" stroke="var(--body)" stroke-width="1.5" marker-end="url(#arrow)"/>
    <line x1="1040" y1="590" x2="1140" y2="270" stroke="var(--body)" stroke-width="1.5" marker-end="url(#arrow)"/>
    <text x="1100" y="430" font-size="9" fill="var(--body)" text-anchor="middle" transform="rotate(-70 1100 430)">{export protocol}</text>
  </g>

  <g id="legend">
    <rect x="60" y="880" width="1280" height="60" rx="4" fill="var(--card)" stroke="var(--border)"/>
    <text x="80" y="900" font-size="11" font-weight="700" fill="var(--ink)" letter-spacing="1.5" font-family="'JetBrains Mono', ui-monospace, SFMono-Regular, Menlo, monospace">HOW TO READ</text>
    <text x="80" y="920" font-size="11" fill="var(--body)" font-family="'Inter', -apple-system, BlinkMacSystemFont, 'Helvetica Neue', Helvetica, Arial, sans-serif">Containers inside the dashed boundary make up the system; externals are outside. Each container shows its technology in [brackets]. Arrows are labeled with the interaction type.</text>
  </g>
</svg>
