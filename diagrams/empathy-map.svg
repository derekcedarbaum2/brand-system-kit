<?xml version="1.0" encoding="UTF-8"?>
<!--
  TEMPLATE: Empathy Map
  Required fonts: JetBrains Mono (500-700), Inter (400-700). {{COMPANY}} brand.
  Center: persona name + photo placeholder. Four quadrants: Says / Thinks / Does / Feels.
  Below: Pains and Gains.
-->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 1000">
<style>:root{
  --ink: #161a19;
  --body: #353b3a;
  --secondary: #5c6463;
  --dim: #6e7574;
  --accent: #1f6e7a;
  --accent-light: #cfe0e2;
  --accent-2: #3e5c8a;
  --teal: #2a7d8a;
  --warm: #8a6d1f;
  --positive: #2e7d4f;
  --emphasis: #9a2d2d;
  --bg: #fbfaf7;
  --card: #f0eee8;
  --card-accent: #e6eef0;
  --border: #e3e0d8;
}</style>
  <title>{Persona} — Empathy Map</title>
  <desc>Empathy map for one persona. Quadrants: Says / Thinks / Does / Feels. Bottom: Pains / Gains.</desc>

  <g id="background"><rect x="0" y="0" width="1200" height="1000" fill="var(--bg)"/></g>

  <g id="header">
    <text x="60" y="56" font-size="26" font-weight="700" fill="var(--ink)" font-family="'JetBrains Mono', ui-monospace, SFMono-Regular, Menlo, monospace" letter-spacing="0.8">{PERSONA NAME} — EMPATHY MAP</text>
    <text x="60" y="82" font-size="13" fill="var(--secondary)" font-family="'Inter', -apple-system, BlinkMacSystemFont, 'Helvetica Neue', Helvetica, Arial, sans-serif">{Scenario / context — e.g., "First-time user of {Product}"}</text>
  </g>

  <g id="persona-center">
    <circle cx="600" cy="450" r="80" fill="var(--card-accent)" stroke="var(--accent)" stroke-width="2.5"/>
    <text x="600" y="446" font-size="13" font-weight="700" fill="var(--accent)" letter-spacing="0.5" text-anchor="middle" font-family="'JetBrains Mono', ui-monospace, SFMono-Regular, Menlo, monospace">PERSONA</text>
    <text x="600" y="464" font-size="11" fill="var(--ink)" text-anchor="middle" font-family="'Inter', -apple-system, BlinkMacSystemFont, 'Helvetica Neue', Helvetica, Arial, sans-serif">{Name + role}</text>
  </g>

  <g id="quadrant-says">
    <rect x="80" y="140" width="480" height="280" rx="6" fill="var(--card)" stroke="var(--teal)" stroke-width="1.5"/>
    <text x="100" y="166" font-size="12" font-weight="700" fill="var(--teal)" letter-spacing="1.5" font-family="'JetBrains Mono', ui-monospace, SFMono-Regular, Menlo, monospace">SAYS</text>
    <text x="100" y="180" font-size="10" font-style="italic" fill="var(--secondary)" font-family="'Inter', -apple-system, BlinkMacSystemFont, 'Helvetica Neue', Helvetica, Arial, sans-serif">direct quotes</text>
    <text x="100" y="218" font-size="11" fill="var(--body)" font-family="'Inter', -apple-system, BlinkMacSystemFont, 'Helvetica Neue', Helvetica, Arial, sans-serif">"{Quote 1}"</text>
    <text x="100" y="248" font-size="11" fill="var(--body)" font-family="'Inter', -apple-system, BlinkMacSystemFont, 'Helvetica Neue', Helvetica, Arial, sans-serif">"{Quote 2}"</text>
    <text x="100" y="278" font-size="11" fill="var(--body)" font-family="'Inter', -apple-system, BlinkMacSystemFont, 'Helvetica Neue', Helvetica, Arial, sans-serif">"{Quote 3}"</text>
  </g>

  <g id="quadrant-thinks">
    <rect x="640" y="140" width="480" height="280" rx="6" fill="var(--card)" stroke="var(--teal)" stroke-width="1.5"/>
    <text x="660" y="166" font-size="12" font-weight="700" fill="var(--teal)" letter-spacing="1.5" font-family="'JetBrains Mono', ui-monospace, SFMono-Regular, Menlo, monospace">THINKS</text>
    <text x="660" y="180" font-size="10" font-style="italic" fill="var(--secondary)" font-family="'Inter', -apple-system, BlinkMacSystemFont, 'Helvetica Neue', Helvetica, Arial, sans-serif">internal thoughts (often unspoken)</text>
    <text x="660" y="218" font-size="11" fill="var(--body)" font-family="'Inter', -apple-system, BlinkMacSystemFont, 'Helvetica Neue', Helvetica, Arial, sans-serif">• {Thought 1}</text>
    <text x="660" y="248" font-size="11" fill="var(--body)" font-family="'Inter', -apple-system, BlinkMacSystemFont, 'Helvetica Neue', Helvetica, Arial, sans-serif">• {Thought 2}</text>
    <text x="660" y="278" font-size="11" fill="var(--body)" font-family="'Inter', -apple-system, BlinkMacSystemFont, 'Helvetica Neue', Helvetica, Arial, sans-serif">• {Thought 3}</text>
  </g>

  <g id="quadrant-does">
    <rect x="80" y="480" width="480" height="280" rx="6" fill="var(--card)" stroke="var(--teal)" stroke-width="1.5"/>
    <text x="100" y="506" font-size="12" font-weight="700" fill="var(--teal)" letter-spacing="1.5" font-family="'JetBrains Mono', ui-monospace, SFMono-Regular, Menlo, monospace">DOES</text>
    <text x="100" y="520" font-size="10" font-style="italic" fill="var(--secondary)" font-family="'Inter', -apple-system, BlinkMacSystemFont, 'Helvetica Neue', Helvetica, Arial, sans-serif">observable behaviors</text>
    <text x="100" y="558" font-size="11" fill="var(--body)" font-family="'Inter', -apple-system, BlinkMacSystemFont, 'Helvetica Neue', Helvetica, Arial, sans-serif">• {Action 1}</text>
    <text x="100" y="588" font-size="11" fill="var(--body)" font-family="'Inter', -apple-system, BlinkMacSystemFont, 'Helvetica Neue', Helvetica, Arial, sans-serif">• {Action 2}</text>
    <text x="100" y="618" font-size="11" fill="var(--body)" font-family="'Inter', -apple-system, BlinkMacSystemFont, 'Helvetica Neue', Helvetica, Arial, sans-serif">• {Action 3}</text>
  </g>

  <g id="quadrant-feels">
    <rect x="640" y="480" width="480" height="280" rx="6" fill="var(--card)" stroke="var(--teal)" stroke-width="1.5"/>
    <text x="660" y="506" font-size="12" font-weight="700" fill="var(--teal)" letter-spacing="1.5" font-family="'JetBrains Mono', ui-monospace, SFMono-Regular, Menlo, monospace">FEELS</text>
    <text x="660" y="520" font-size="10" font-style="italic" fill="var(--secondary)" font-family="'Inter', -apple-system, BlinkMacSystemFont, 'Helvetica Neue', Helvetica, Arial, sans-serif">emotional state</text>
    <text x="660" y="558" font-size="11" fill="var(--body)" font-family="'Inter', -apple-system, BlinkMacSystemFont, 'Helvetica Neue', Helvetica, Arial, sans-serif">• {Emotion 1}</text>
    <text x="660" y="588" font-size="11" fill="var(--body)" font-family="'Inter', -apple-system, BlinkMacSystemFont, 'Helvetica Neue', Helvetica, Arial, sans-serif">• {Emotion 2}</text>
    <text x="660" y="618" font-size="11" fill="var(--body)" font-family="'Inter', -apple-system, BlinkMacSystemFont, 'Helvetica Neue', Helvetica, Arial, sans-serif">• {Emotion 3}</text>
  </g>

  <g id="pains">
    <rect x="80" y="800" width="500" height="120" rx="6" fill="var(--card-accent)" stroke="var(--accent)" stroke-width="2"/>
    <text x="100" y="826" font-size="12" font-weight="700" fill="var(--accent)" letter-spacing="1.5" font-family="'JetBrains Mono', ui-monospace, SFMono-Regular, Menlo, monospace">PAINS</text>
    <text x="100" y="852" font-size="11" fill="var(--body)" font-family="'Inter', -apple-system, BlinkMacSystemFont, 'Helvetica Neue', Helvetica, Arial, sans-serif">• {Frustration / fear / obstacle 1}</text>
    <text x="100" y="874" font-size="11" fill="var(--body)" font-family="'Inter', -apple-system, BlinkMacSystemFont, 'Helvetica Neue', Helvetica, Arial, sans-serif">• {Pain 2}</text>
    <text x="100" y="896" font-size="11" fill="var(--body)" font-family="'Inter', -apple-system, BlinkMacSystemFont, 'Helvetica Neue', Helvetica, Arial, sans-serif">• {Pain 3}</text>
  </g>

  <g id="gains">
    <rect x="620" y="800" width="500" height="120" rx="6" fill="var(--card-accent)" stroke="var(--teal)" stroke-width="2"/>
    <text x="640" y="826" font-size="12" font-weight="700" fill="var(--teal)" letter-spacing="1.5" font-family="'JetBrains Mono', ui-monospace, SFMono-Regular, Menlo, monospace">GAINS</text>
    <text x="640" y="852" font-size="11" fill="var(--body)" font-family="'Inter', -apple-system, BlinkMacSystemFont, 'Helvetica Neue', Helvetica, Arial, sans-serif">• {Wants / hopes / desired outcome 1}</text>
    <text x="640" y="874" font-size="11" fill="var(--body)" font-family="'Inter', -apple-system, BlinkMacSystemFont, 'Helvetica Neue', Helvetica, Arial, sans-serif">• {Gain 2}</text>
    <text x="640" y="896" font-size="11" fill="var(--body)" font-family="'Inter', -apple-system, BlinkMacSystemFont, 'Helvetica Neue', Helvetica, Arial, sans-serif">• {Gain 3}</text>
  </g>
</svg>
