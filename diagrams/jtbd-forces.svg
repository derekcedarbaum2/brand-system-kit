<?xml version="1.0" encoding="UTF-8"?>
<!--
  TEMPLATE: Jobs-To-Be-Done Forces Diagram (Push/Pull/Anxiety/Habit)
  Required fonts: JetBrains Mono (500-700), Inter (400-700). {{COMPANY}} brand.
  Two opposing forces drive switch (push from current + pull of new); two opposing forces resist (anxiety of new + habit of current).
-->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1300 900">
<style>:root{
  --ink: #161a19;
  --body: #353b3a;
  --secondary: #5c6463;
  --dim: #6e7574;
  --accent: #1f6e7a;
  --accent-light: #cfe0e2;
  --accent-2: #3e5c8a;
  --teal: #2a7d8a;
  --warm: #8a6d1f;
  --positive: #2e7d4f;
  --emphasis: #9a2d2d;
  --bg: #fbfaf7;
  --card: #f0eee8;
  --card-accent: #e6eef0;
  --border: #e3e0d8;
}</style>
  <title>{Job} — JTBD Forces of Progress</title>
  <desc>Bob Moesta four-forces diagram. Push of situation + Pull of new solution drive switch; Anxiety of new + Habit of current resist switch.</desc>
  <defs>
    <marker id="arrowR" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="9" markerHeight="9" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="var(--accent)"/>
    </marker>
    <marker id="arrowG" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="9" markerHeight="9" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="var(--secondary)"/>
    </marker>
  </defs>

  <g id="background"><rect x="0" y="0" width="1300" height="900" fill="var(--bg)"/></g>

  <g id="header">
    <text x="60" y="56" font-size="26" font-weight="700" fill="var(--ink)" font-family="'JetBrains Mono', ui-monospace, SFMono-Regular, Menlo, monospace" letter-spacing="0.8">{JOB} — FORCES OF PROGRESS</text>
    <text x="60" y="82" font-size="13" fill="var(--secondary)" font-family="'Inter', -apple-system, BlinkMacSystemFont, 'Helvetica Neue', Helvetica, Arial, sans-serif">Switch happens when (Push + Pull) &gt; (Anxiety + Habit). JTBD framework, Moesta &amp; Christensen.</text>
  </g>

  <g id="customer-center">
    <rect x="500" y="380" width="300" height="120" rx="8" fill="var(--card-accent)" stroke="var(--accent)" stroke-width="2.5"/>
    <text x="650" y="412" font-size="14" font-weight="700" fill="var(--accent)" letter-spacing="1" text-anchor="middle" font-family="'JetBrains Mono', ui-monospace, SFMono-Regular, Menlo, monospace">CUSTOMER &amp; JOB</text>
    <text x="650" y="438" font-size="13" font-weight="700" fill="var(--ink)" text-anchor="middle" font-family="'Inter', -apple-system, BlinkMacSystemFont, 'Helvetica Neue', Helvetica, Arial, sans-serif">{Persona}</text>
    <text x="650" y="460" font-size="11" fill="var(--body)" text-anchor="middle" font-family="'Inter', -apple-system, BlinkMacSystemFont, 'Helvetica Neue', Helvetica, Arial, sans-serif">"When I {situation},</text>
    <text x="650" y="476" font-size="11" fill="var(--body)" text-anchor="middle" font-family="'Inter', -apple-system, BlinkMacSystemFont, 'Helvetica Neue', Helvetica, Arial, sans-serif">I want {motivation}, so I can {outcome}"</text>
  </g>

  <g id="push-from-current">
    <rect x="80" y="160" width="380" height="180" rx="6" fill="var(--card-accent)" stroke="var(--accent)" stroke-width="2"/>
    <text x="100" y="186" font-size="12" font-weight="700" fill="var(--accent)" letter-spacing="1.5" font-family="'JetBrains Mono', ui-monospace, SFMono-Regular, Menlo, monospace">PUSH OF SITUATION</text>
    <text x="100" y="204" font-size="10" font-style="italic" fill="var(--secondary)" font-family="'Inter', -apple-system, BlinkMacSystemFont, 'Helvetica Neue', Helvetica, Arial, sans-serif">why current solution is failing — drives switch</text>
    <text x="100" y="234" font-size="11" fill="var(--body)" font-family="'Inter', -apple-system, BlinkMacSystemFont, 'Helvetica Neue', Helvetica, Arial, sans-serif">• {Pain 1 with current solution}</text>
    <text x="100" y="258" font-size="11" fill="var(--body)" font-family="'Inter', -apple-system, BlinkMacSystemFont, 'Helvetica Neue', Helvetica, Arial, sans-serif">• {Pain 2}</text>
    <text x="100" y="282" font-size="11" fill="var(--body)" font-family="'Inter', -apple-system, BlinkMacSystemFont, 'Helvetica Neue', Helvetica, Arial, sans-serif">• {Pain 3}</text>
    <text x="100" y="316" font-size="10" font-weight="700" fill="var(--accent)" font-family="'JetBrains Mono', ui-monospace, SFMono-Regular, Menlo, monospace" letter-spacing="0.5">FORCE: HIGH / MED / LOW</text>
  </g>
  <line x1="460" y1="280" x2="500" y2="420" stroke="var(--accent)" stroke-width="2.5" marker-end="url(#arrowR)"/>

  <g id="pull-of-new">
    <rect x="840" y="160" width="380" height="180" rx="6" fill="var(--card-accent)" stroke="var(--accent)" stroke-width="2"/>
    <text x="860" y="186" font-size="12" font-weight="700" fill="var(--accent)" letter-spacing="1.5" font-family="'JetBrains Mono', ui-monospace, SFMono-Regular, Menlo, monospace">PULL OF NEW SOLUTION</text>
    <text x="860" y="204" font-size="10" font-style="italic" fill="var(--secondary)" font-family="'Inter', -apple-system, BlinkMacSystemFont, 'Helvetica Neue', Helvetica, Arial, sans-serif">why our solution attracts — drives switch</text>
    <text x="860" y="234" font-size="11" fill="var(--body)" font-family="'Inter', -apple-system, BlinkMacSystemFont, 'Helvetica Neue', Helvetica, Arial, sans-serif">• {Benefit / promise 1}</text>
    <text x="860" y="258" font-size="11" fill="var(--body)" font-family="'Inter', -apple-system, BlinkMacSystemFont, 'Helvetica Neue', Helvetica, Arial, sans-serif">• {Benefit 2}</text>
    <text x="860" y="282" font-size="11" fill="var(--body)" font-family="'Inter', -apple-system, BlinkMacSystemFont, 'Helvetica Neue', Helvetica, Arial, sans-serif">• {Benefit 3}</text>
    <text x="860" y="316" font-size="10" font-weight="700" fill="var(--accent)" font-family="'JetBrains Mono', ui-monospace, SFMono-Regular, Menlo, monospace" letter-spacing="0.5">FORCE: HIGH / MED / LOW</text>
  </g>
  <line x1="840" y1="280" x2="800" y2="420" stroke="var(--accent)" stroke-width="2.5" marker-end="url(#arrowR)"/>

  <g id="anxiety-of-new">
    <rect x="80" y="540" width="380" height="180" rx="6" fill="var(--card)" stroke="var(--dim)" stroke-width="1.5"/>
    <text x="100" y="566" font-size="12" font-weight="700" fill="var(--secondary)" letter-spacing="1.5" font-family="'JetBrains Mono', ui-monospace, SFMono-Regular, Menlo, monospace">ANXIETY OF NEW</text>
    <text x="100" y="584" font-size="10" font-style="italic" fill="var(--secondary)" font-family="'Inter', -apple-system, BlinkMacSystemFont, 'Helvetica Neue', Helvetica, Arial, sans-serif">fear of switching — resists switch</text>
    <text x="100" y="614" font-size="11" fill="var(--body)" font-family="'Inter', -apple-system, BlinkMacSystemFont, 'Helvetica Neue', Helvetica, Arial, sans-serif">• {Concern about new solution 1}</text>
    <text x="100" y="638" font-size="11" fill="var(--body)" font-family="'Inter', -apple-system, BlinkMacSystemFont, 'Helvetica Neue', Helvetica, Arial, sans-serif">• {Concern 2}</text>
    <text x="100" y="662" font-size="11" fill="var(--body)" font-family="'Inter', -apple-system, BlinkMacSystemFont, 'Helvetica Neue', Helvetica, Arial, sans-serif">• {Concern 3}</text>
    <text x="100" y="696" font-size="10" font-weight="700" fill="var(--secondary)" font-family="'JetBrains Mono', ui-monospace, SFMono-Regular, Menlo, monospace" letter-spacing="0.5">FORCE: HIGH / MED / LOW</text>
  </g>
  <line x1="460" y1="600" x2="500" y2="460" stroke="var(--secondary)" stroke-width="2.5" marker-end="url(#arrowG)"/>

  <g id="habit-of-current">
    <rect x="840" y="540" width="380" height="180" rx="6" fill="var(--card)" stroke="var(--dim)" stroke-width="1.5"/>
    <text x="860" y="566" font-size="12" font-weight="700" fill="var(--secondary)" letter-spacing="1.5" font-family="'JetBrains Mono', ui-monospace, SFMono-Regular, Menlo, monospace">HABIT OF CURRENT</text>
    <text x="860" y="584" font-size="10" font-style="italic" fill="var(--secondary)" font-family="'Inter', -apple-system, BlinkMacSystemFont, 'Helvetica Neue', Helvetica, Arial, sans-serif">attachment to existing — resists switch</text>
    <text x="860" y="614" font-size="11" fill="var(--body)" font-family="'Inter', -apple-system, BlinkMacSystemFont, 'Helvetica Neue', Helvetica, Arial, sans-serif">• {Why current solution feels safe}</text>
    <text x="860" y="638" font-size="11" fill="var(--body)" font-family="'Inter', -apple-system, BlinkMacSystemFont, 'Helvetica Neue', Helvetica, Arial, sans-serif">• {Sunk cost / familiarity}</text>
    <text x="860" y="662" font-size="11" fill="var(--body)" font-family="'Inter', -apple-system, BlinkMacSystemFont, 'Helvetica Neue', Helvetica, Arial, sans-serif">• {Habit 3}</text>
    <text x="860" y="696" font-size="10" font-weight="700" fill="var(--secondary)" font-family="'JetBrains Mono', ui-monospace, SFMono-Regular, Menlo, monospace" letter-spacing="0.5">FORCE: HIGH / MED / LOW</text>
  </g>
  <line x1="840" y1="600" x2="800" y2="460" stroke="var(--secondary)" stroke-width="2.5" marker-end="url(#arrowG)"/>

  <g id="footer">
    <rect x="60" y="800" width="1180" height="60" rx="4" fill="var(--card)" stroke="var(--accent)"/>
    <text x="80" y="822" font-size="11" font-weight="700" fill="var(--ink)" letter-spacing="1.5" font-family="'JetBrains Mono', ui-monospace, SFMono-Regular, Menlo, monospace">SWITCHING EQUATION</text>
    <text x="80" y="844" font-size="12" fill="var(--ink)" font-family="'Inter', -apple-system, BlinkMacSystemFont, 'Helvetica Neue', Helvetica, Arial, sans-serif">Switch happens when (Push + Pull) &gt; (Anxiety + Habit). Identify the strongest force in each quadrant; design messaging to amplify drivers and reduce resisters.</text>
  </g>
</svg>
