<?xml version="1.0" encoding="UTF-8"?>
<!--
  TEMPLATE: Perceptual / Competitive Positioning Map
  Required fonts: JetBrains Mono (500-700), Inter (400-700). {{COMPANY}} brand.
  Two perpendicular axes representing strategic dimensions; competitors plotted as labeled bubbles. Bubble size optionally encodes a third dimension (revenue, share, etc.).
-->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 900">
<style>:root{
  --ink: #161a19;
  --body: #353b3a;
  --secondary: #5c6463;
  --dim: #6e7574;
  --accent: #1f6e7a;
  --accent-light: #cfe0e2;
  --accent-2: #3e5c8a;
  --teal: #2a7d8a;
  --warm: #8a6d1f;
  --positive: #2e7d4f;
  --emphasis: #9a2d2d;
  --bg: #fbfaf7;
  --card: #f0eee8;
  --card-accent: #e6eef0;
  --border: #e3e0d8;
}</style>
  <title>{Market} — Perceptual Map</title>
  <desc>Competitive positioning map: two strategic dimensions, competitors plotted as bubbles. Use to find white space.</desc>

  <g id="background"><rect x="0" y="0" width="1200" height="900" fill="var(--bg)"/></g>

  <g id="header">
    <text x="60" y="56" font-size="26" font-weight="700" fill="var(--ink)" font-family="'JetBrains Mono', ui-monospace, SFMono-Regular, Menlo, monospace" letter-spacing="0.8">{MARKET} POSITIONING MAP</text>
    <text x="60" y="82" font-size="13" fill="var(--secondary)" font-family="'Inter', -apple-system, BlinkMacSystemFont, 'Helvetica Neue', Helvetica, Arial, sans-serif">Bubble size = {revenue / share / deployment count}. White space = strategic opportunity.</text>
  </g>

  <g id="plot-area">
    <rect x="160" y="140" width="900" height="600" fill="var(--card)" stroke="var(--border)"/>
    <line x1="610" y1="140" x2="610" y2="740" stroke="var(--ink)" stroke-width="1.5"/>
    <line x1="160" y1="440" x2="1060" y2="440" stroke="var(--ink)" stroke-width="1.5"/>

    <text x="610" y="125" font-size="11" font-weight="700" fill="var(--ink)" letter-spacing="1.5" text-anchor="middle" font-family="'JetBrains Mono', ui-monospace, SFMono-Regular, Menlo, monospace">{Y AXIS HIGH}</text>
    <text x="610" y="765" font-size="11" font-weight="700" fill="var(--ink)" letter-spacing="1.5" text-anchor="middle" font-family="'JetBrains Mono', ui-monospace, SFMono-Regular, Menlo, monospace">{Y AXIS LOW}</text>
    <text x="160" y="436" font-size="11" font-weight="700" fill="var(--ink)" letter-spacing="1.5" text-anchor="end" font-family="'JetBrains Mono', ui-monospace, SFMono-Regular, Menlo, monospace" transform="translate(-10 0)">{X LOW}</text>
    <text x="1080" y="436" font-size="11" font-weight="700" fill="var(--ink)" letter-spacing="1.5" font-family="'JetBrains Mono', ui-monospace, SFMono-Regular, Menlo, monospace">{X HIGH}</text>

    <circle cx="780" cy="240" r="48" fill="var(--card-accent)" stroke="var(--accent)" stroke-width="2.5"/>
    <text x="780" y="244" font-size="13" font-weight="700" fill="var(--accent)" text-anchor="middle" font-family="'Inter', -apple-system, BlinkMacSystemFont, 'Helvetica Neue', Helvetica, Arial, sans-serif">US</text>
    <text x="780" y="306" font-size="10" font-weight="700" fill="var(--ink)" text-anchor="middle" font-family="'Inter', -apple-system, BlinkMacSystemFont, 'Helvetica Neue', Helvetica, Arial, sans-serif">{Our position}</text>

    <circle cx="350" cy="320" r="42" fill="var(--card)" stroke="var(--secondary)" stroke-width="2"/>
    <text x="350" y="324" font-size="13" font-weight="700" fill="var(--ink)" text-anchor="middle" font-family="'Inter', -apple-system, BlinkMacSystemFont, 'Helvetica Neue', Helvetica, Arial, sans-serif">A</text>
    <text x="350" y="386" font-size="10" font-weight="700" fill="var(--ink)" text-anchor="middle" font-family="'Inter', -apple-system, BlinkMacSystemFont, 'Helvetica Neue', Helvetica, Arial, sans-serif">{Competitor A}</text>

    <circle cx="490" cy="540" r="60" fill="var(--card)" stroke="var(--secondary)" stroke-width="2"/>
    <text x="490" y="546" font-size="14" font-weight="700" fill="var(--ink)" text-anchor="middle" font-family="'Inter', -apple-system, BlinkMacSystemFont, 'Helvetica Neue', Helvetica, Arial, sans-serif">B</text>
    <text x="490" y="624" font-size="10" font-weight="700" fill="var(--ink)" text-anchor="middle" font-family="'Inter', -apple-system, BlinkMacSystemFont, 'Helvetica Neue', Helvetica, Arial, sans-serif">{Competitor B (largest)}</text>

    <circle cx="900" cy="600" r="34" fill="var(--card)" stroke="var(--secondary)" stroke-width="2"/>
    <text x="900" y="604" font-size="12" font-weight="700" fill="var(--ink)" text-anchor="middle" font-family="'Inter', -apple-system, BlinkMacSystemFont, 'Helvetica Neue', Helvetica, Arial, sans-serif">C</text>
    <text x="900" y="660" font-size="10" font-weight="700" fill="var(--ink)" text-anchor="middle" font-family="'Inter', -apple-system, BlinkMacSystemFont, 'Helvetica Neue', Helvetica, Arial, sans-serif">{Competitor C}</text>

    <rect x="180" y="160" width="180" height="80" rx="4" fill="var(--card-accent)" stroke="var(--teal)" stroke-width="1.5" stroke-dasharray="5,3"/>
    <text x="270" y="194" font-size="11" font-weight="700" fill="var(--teal)" letter-spacing="1" text-anchor="middle" font-family="'JetBrains Mono', ui-monospace, SFMono-Regular, Menlo, monospace">WHITE SPACE</text>
    <text x="270" y="216" font-size="9" fill="var(--ink)" text-anchor="middle" font-family="'Inter', -apple-system, BlinkMacSystemFont, 'Helvetica Neue', Helvetica, Arial, sans-serif">{Strategic opportunity}</text>
  </g>

  <g id="x-axis-label">
    <text x="610" y="800" font-size="13" font-weight="700" fill="var(--ink)" letter-spacing="1.5" text-anchor="middle" font-family="'JetBrains Mono', ui-monospace, SFMono-Regular, Menlo, monospace">{X AXIS — E.G., FIDELITY / COST / SPECIALIZATION}</text>
  </g>

  <g id="y-axis-label">
    <text x="50" y="440" font-size="13" font-weight="700" fill="var(--ink)" letter-spacing="1.5" text-anchor="middle" font-family="'JetBrains Mono', ui-monospace, SFMono-Regular, Menlo, monospace" transform="rotate(-90 50 440)">{Y AXIS — E.G., AFFORDABILITY / SCALE}</text>
  </g>

  <g id="footer">
    <rect x="60" y="820" width="1080" height="60" rx="4" fill="var(--card)" stroke="var(--border)"/>
    <text x="80" y="842" font-size="11" font-weight="700" fill="var(--ink)" letter-spacing="1.5" font-family="'JetBrains Mono', ui-monospace, SFMono-Regular, Menlo, monospace">HOW TO READ</text>
    <text x="80" y="860" font-size="11" fill="var(--body)" font-family="'Inter', -apple-system, BlinkMacSystemFont, 'Helvetica Neue', Helvetica, Arial, sans-serif">Bubble position = strategic position on two axes; size = quantitative dimension; dashed area = white space (no competitors). Brand Red bubble = us.</text>
  </g>
</svg>
