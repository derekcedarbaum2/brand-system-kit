<?xml version="1.0" encoding="UTF-8"?>
<!--
  TEMPLATE: Prototype Map (Figma-style page connections)
  Required fonts: JetBrains Mono (500-700), Inter (400-700). {{COMPANY}} brand.
  Pages as small thumbnail rectangles connected by labeled arrows. Different from sitemap (which is hierarchical) — this is the connection graph.
-->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1400 900">
<style>:root{
  --ink: #161a19;
  --body: #353b3a;
  --secondary: #5c6463;
  --dim: #6e7574;
  --accent: #1f6e7a;
  --accent-light: #cfe0e2;
  --accent-2: #3e5c8a;
  --teal: #2a7d8a;
  --warm: #8a6d1f;
  --positive: #2e7d4f;
  --emphasis: #9a2d2d;
  --bg: #fbfaf7;
  --card: #f0eee8;
  --card-accent: #e6eef0;
  --border: #e3e0d8;
}</style>
  <title>{Product} — Prototype Map</title>
  <desc>Page-to-page connection graph. Shows the full app linkage at a glance. Different from sitemap (hierarchy) — this captures relations.</desc>
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="9" markerHeight="9" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="var(--body)"/>
    </marker>
    <marker id="arrowR" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="9" markerHeight="9" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="var(--accent)"/>
    </marker>
  </defs>

  <g id="background"><rect x="0" y="0" width="1400" height="900" fill="var(--bg)"/></g>

  <g id="header">
    <text x="60" y="56" font-size="26" font-weight="700" fill="var(--ink)" font-family="'JetBrains Mono', ui-monospace, SFMono-Regular, Menlo, monospace" letter-spacing="0.8">{PRODUCT} — PROTOTYPE MAP</text>
    <text x="60" y="82" font-size="13" fill="var(--secondary)" font-family="'Inter', -apple-system, BlinkMacSystemFont, 'Helvetica Neue', Helvetica, Arial, sans-serif">All page-to-page connections. Red arrows = primary flow; gray = secondary; dashed = error/back paths.</text>
  </g>

  <g id="entry">
    <rect x="80" y="160" width="180" height="120" rx="4" fill="var(--bg)" stroke="var(--accent)" stroke-width="2.5"/>
    <rect x="80" y="160" width="180" height="24" rx="4" fill="var(--accent)"/>
    <text x="170" y="178" font-size="10" font-weight="700" fill="var(--bg)" text-anchor="middle" font-family="'JetBrains Mono', ui-monospace, SFMono-Regular, Menlo, monospace" letter-spacing="0.8">ENTRY</text>
    <rect x="100" y="200" width="140" height="6" rx="1" fill="var(--border)"/>
    <rect x="100" y="214" width="100" height="4" rx="1" fill="var(--border)"/>
    <rect x="100" y="226" width="120" height="4" rx="1" fill="var(--border)"/>
    <rect x="100" y="248" width="140" height="20" rx="2" fill="var(--accent)"/>
    <text x="170" y="262" font-size="9" font-weight="700" fill="var(--bg)" text-anchor="middle" font-family="'Inter', -apple-system, BlinkMacSystemFont, 'Helvetica Neue', Helvetica, Arial, sans-serif">{Login / Home}</text>
  </g>

  <g id="page-2">
    <rect x="380" y="160" width="180" height="120" rx="4" fill="var(--bg)" stroke="var(--teal)" stroke-width="2"/>
    <rect x="380" y="160" width="180" height="24" rx="4" fill="var(--teal)"/>
    <text x="470" y="178" font-size="10" font-weight="700" fill="var(--bg)" text-anchor="middle" font-family="'JetBrains Mono', ui-monospace, SFMono-Regular, Menlo, monospace" letter-spacing="0.8">DASHBOARD</text>
    <rect x="400" y="200" width="60" height="40" rx="2" fill="var(--card)" stroke="var(--dim)"/>
    <rect x="470" y="200" width="60" height="40" rx="2" fill="var(--card)" stroke="var(--dim)"/>
    <rect x="400" y="248" width="130" height="20" rx="2" fill="var(--teal)"/>
    <text x="465" y="262" font-size="9" font-weight="700" fill="var(--bg)" text-anchor="middle" font-family="'Inter', -apple-system, BlinkMacSystemFont, 'Helvetica Neue', Helvetica, Arial, sans-serif">{Main}</text>
  </g>

  <g id="page-3">
    <rect x="680" y="160" width="180" height="120" rx="4" fill="var(--bg)" stroke="var(--teal)" stroke-width="2"/>
    <rect x="680" y="160" width="180" height="24" rx="4" fill="var(--teal)"/>
    <text x="770" y="178" font-size="10" font-weight="700" fill="var(--bg)" text-anchor="middle" font-family="'JetBrains Mono', ui-monospace, SFMono-Regular, Menlo, monospace" letter-spacing="0.8">DETAIL</text>
    <rect x="700" y="200" width="140" height="40" rx="2" fill="var(--card)" stroke="var(--dim)"/>
    <rect x="700" y="248" width="65" height="20" rx="2" fill="var(--card)" stroke="var(--dim)"/>
    <rect x="775" y="248" width="65" height="20" rx="2" fill="var(--teal)"/>
  </g>

  <g id="page-4">
    <rect x="380" y="380" width="180" height="120" rx="4" fill="var(--bg)" stroke="var(--teal)" stroke-width="2"/>
    <rect x="380" y="380" width="180" height="24" rx="4" fill="var(--teal)"/>
    <text x="470" y="398" font-size="10" font-weight="700" fill="var(--bg)" text-anchor="middle" font-family="'JetBrains Mono', ui-monospace, SFMono-Regular, Menlo, monospace" letter-spacing="0.8">CREATE</text>
    <rect x="400" y="420" width="140" height="20" rx="2" fill="var(--card)" stroke="var(--dim)"/>
    <rect x="400" y="448" width="140" height="20" rx="2" fill="var(--card)" stroke="var(--dim)"/>
    <rect x="400" y="476" width="140" height="20" rx="2" fill="var(--accent)"/>
  </g>

  <g id="page-5">
    <rect x="680" y="380" width="180" height="120" rx="4" fill="var(--bg)" stroke="var(--teal)" stroke-width="2"/>
    <rect x="680" y="380" width="180" height="24" rx="4" fill="var(--teal)"/>
    <text x="770" y="398" font-size="10" font-weight="700" fill="var(--bg)" text-anchor="middle" font-family="'JetBrains Mono', ui-monospace, SFMono-Regular, Menlo, monospace" letter-spacing="0.8">EDIT</text>
  </g>

  <g id="page-6">
    <rect x="980" y="160" width="180" height="120" rx="4" fill="var(--bg)" stroke="var(--dim)" stroke-width="1.5"/>
    <rect x="980" y="160" width="180" height="24" rx="4" fill="var(--dim)"/>
    <text x="1070" y="178" font-size="10" font-weight="700" fill="var(--bg)" text-anchor="middle" font-family="'JetBrains Mono', ui-monospace, SFMono-Regular, Menlo, monospace" letter-spacing="0.8">SETTINGS</text>
  </g>

  <g id="error-page">
    <rect x="980" y="380" width="180" height="120" rx="4" fill="var(--card-accent)" stroke="var(--accent)" stroke-width="1.5" stroke-dasharray="4,3"/>
    <rect x="980" y="380" width="180" height="24" rx="4" fill="var(--accent)"/>
    <text x="1070" y="398" font-size="10" font-weight="700" fill="var(--bg)" text-anchor="middle" font-family="'JetBrains Mono', ui-monospace, SFMono-Regular, Menlo, monospace" letter-spacing="0.8">ERROR / 404</text>
  </g>

  <g id="connections">
    <line x1="260" y1="220" x2="380" y2="220" stroke="var(--accent)" stroke-width="2" marker-end="url(#arrowR)"/>
    <text x="320" y="212" font-size="9" fill="var(--accent)" text-anchor="middle" font-family="'Inter', -apple-system, BlinkMacSystemFont, 'Helvetica Neue', Helvetica, Arial, sans-serif">login → home</text>

    <line x1="560" y1="220" x2="680" y2="220" stroke="var(--accent)" stroke-width="2" marker-end="url(#arrowR)"/>
    <text x="620" y="212" font-size="9" fill="var(--accent)" text-anchor="middle" font-family="'Inter', -apple-system, BlinkMacSystemFont, 'Helvetica Neue', Helvetica, Arial, sans-serif">view detail</text>

    <line x1="470" y1="280" x2="470" y2="380" stroke="var(--body)" stroke-width="1.5" marker-end="url(#arrow)"/>
    <text x="490" y="335" font-size="9" fill="var(--body)" font-family="'Inter', -apple-system, BlinkMacSystemFont, 'Helvetica Neue', Helvetica, Arial, sans-serif">create new</text>

    <line x1="770" y1="280" x2="770" y2="380" stroke="var(--body)" stroke-width="1.5" marker-end="url(#arrow)"/>
    <text x="790" y="335" font-size="9" fill="var(--body)" font-family="'Inter', -apple-system, BlinkMacSystemFont, 'Helvetica Neue', Helvetica, Arial, sans-serif">edit</text>

    <line x1="560" y1="440" x2="680" y2="440" stroke="var(--body)" stroke-width="1.5" marker-end="url(#arrow)"/>
    <text x="620" y="432" font-size="9" fill="var(--body)" text-anchor="middle" font-family="'Inter', -apple-system, BlinkMacSystemFont, 'Helvetica Neue', Helvetica, Arial, sans-serif">submit → edit view</text>

    <path d="M 380 240 C 320 280, 320 380, 380 440" fill="none" stroke="var(--dim)" stroke-width="1.5" stroke-dasharray="4,3" marker-end="url(#arrow)"/>
    <text x="280" y="350" font-size="9" fill="var(--secondary)" font-family="'Inter', -apple-system, BlinkMacSystemFont, 'Helvetica Neue', Helvetica, Arial, sans-serif">cancel ←</text>

    <line x1="860" y1="220" x2="980" y2="220" stroke="var(--dim)" stroke-width="1.5" marker-end="url(#arrow)"/>
    <text x="920" y="212" font-size="9" fill="var(--secondary)" text-anchor="middle" font-family="'Inter', -apple-system, BlinkMacSystemFont, 'Helvetica Neue', Helvetica, Arial, sans-serif">settings</text>

    <line x1="860" y1="440" x2="980" y2="440" stroke="var(--accent)" stroke-width="1.5" stroke-dasharray="4,3" marker-end="url(#arrowR)"/>
    <text x="920" y="432" font-size="9" fill="var(--accent)" text-anchor="middle" font-family="'Inter', -apple-system, BlinkMacSystemFont, 'Helvetica Neue', Helvetica, Arial, sans-serif">[on error]</text>
  </g>

  <g id="legend">
    <rect x="60" y="780" width="1280" height="80" rx="4" fill="var(--card)" stroke="var(--border)"/>
    <text x="80" y="800" font-size="11" font-weight="700" fill="var(--ink)" letter-spacing="1.5" font-family="'JetBrains Mono', ui-monospace, SFMono-Regular, Menlo, monospace">LEGEND</text>
    <line x1="80" y1="816" x2="120" y2="816" stroke="var(--accent)" stroke-width="2"/>
    <text x="130" y="820" font-size="11" fill="var(--body)" font-family="'Inter', -apple-system, BlinkMacSystemFont, 'Helvetica Neue', Helvetica, Arial, sans-serif">Primary flow (happy path)</text>
    <line x1="370" y1="816" x2="410" y2="816" stroke="var(--body)" stroke-width="1.5"/>
    <text x="420" y="820" font-size="11" fill="var(--body)" font-family="'Inter', -apple-system, BlinkMacSystemFont, 'Helvetica Neue', Helvetica, Arial, sans-serif">Secondary connection</text>
    <line x1="630" y1="816" x2="670" y2="816" stroke="var(--dim)" stroke-width="1.5" stroke-dasharray="4,3"/>
    <text x="680" y="820" font-size="11" fill="var(--body)" font-family="'Inter', -apple-system, BlinkMacSystemFont, 'Helvetica Neue', Helvetica, Arial, sans-serif">Back / cancel</text>
    <line x1="850" y1="816" x2="890" y2="816" stroke="var(--accent)" stroke-width="1.5" stroke-dasharray="4,3"/>
    <text x="900" y="820" font-size="11" fill="var(--body)" font-family="'Inter', -apple-system, BlinkMacSystemFont, 'Helvetica Neue', Helvetica, Arial, sans-serif">Error path</text>
    <text x="80" y="846" font-size="10" font-style="italic" fill="var(--secondary)" font-family="'Inter', -apple-system, BlinkMacSystemFont, 'Helvetica Neue', Helvetica, Arial, sans-serif">Different from sitemap (hierarchical) — this is the connection graph (any-to-any). Use to spot dead-end pages or orphan flows.</text>
  </g>
</svg>
