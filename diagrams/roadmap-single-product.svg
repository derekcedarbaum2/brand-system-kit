<?xml version="1.0" encoding="UTF-8"?>
<!--
  TEMPLATE (skeleton): Single-Product Roadmap
  Required Figma fonts: JetBrains Mono (700) for headlines/labels, Inter (400, 700) for body.
  Default canvas: 1400 × 800. Workstreams as rows, time as columns. 4 quarters max horizon.
-->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1400 800">
<style>:root{
  --ink: #161a19;
  --body: #353b3a;
  --secondary: #5c6463;
  --dim: #6e7574;
  --accent: #1f6e7a;
  --accent-light: #cfe0e2;
  --accent-2: #3e5c8a;
  --teal: #2a7d8a;
  --warm: #8a6d1f;
  --positive: #2e7d4f;
  --emphasis: #9a2d2d;
  --bg: #fbfaf7;
  --card: #f0eee8;
  --card-accent: #e6eef0;
  --border: #e3e0d8;
}</style>
  <title>{Product Name} — Roadmap</title>
  <desc>Quarterly roadmap with workstreams as rows, milestones as marked points, today indicator.</desc>

  <g id="background">
    <rect x="0" y="0" width="1400" height="800" fill="var(--bg)"/>
  </g>

  <g id="header">
    <text id="title" x="60" y="56" font-size="26" font-weight="700" fill="var(--ink)" font-family="'JetBrains Mono', ui-monospace, SFMono-Regular, Menlo, monospace" letter-spacing="0.8">{PRODUCT NAME} ROADMAP</text>
    <text id="subtitle" x="60" y="82" font-size="13" fill="var(--secondary)" font-family="'Inter', -apple-system, BlinkMacSystemFont, 'Helvetica Neue', Helvetica, Arial, sans-serif">As of {date}. Conditional / at-risk items shown dashed.</text>
  </g>

  <g id="time-axis">
    <line x1="280" y1="140" x2="1340" y2="140" stroke="var(--body)" stroke-width="1.5"/>
    <text x="280" y="130" font-size="13" font-weight="700" fill="var(--ink)" font-family="'JetBrains Mono', ui-monospace, SFMono-Regular, Menlo, monospace" letter-spacing="0.8" text-anchor="middle">Q1</text>
    <text x="545" y="130" font-size="13" font-weight="700" fill="var(--ink)" font-family="'JetBrains Mono', ui-monospace, SFMono-Regular, Menlo, monospace" letter-spacing="0.8" text-anchor="middle">Q2</text>
    <text x="810" y="130" font-size="13" font-weight="700" fill="var(--ink)" font-family="'JetBrains Mono', ui-monospace, SFMono-Regular, Menlo, monospace" letter-spacing="0.8" text-anchor="middle">Q3</text>
    <text x="1075" y="130" font-size="13" font-weight="700" fill="var(--ink)" font-family="'JetBrains Mono', ui-monospace, SFMono-Regular, Menlo, monospace" letter-spacing="0.8" text-anchor="middle">Q4</text>
    <line x1="412" y1="135" x2="412" y2="145" stroke="var(--body)" stroke-width="1.5"/>
    <line x1="677" y1="135" x2="677" y2="145" stroke="var(--body)" stroke-width="1.5"/>
    <line x1="942" y1="135" x2="942" y2="145" stroke="var(--body)" stroke-width="1.5"/>
    <line x1="1207" y1="135" x2="1207" y2="145" stroke="var(--body)" stroke-width="1.5"/>
  </g>

  <g id="today-marker">
    <line x1="500" y1="160" x2="500" y2="640" stroke="var(--accent)" stroke-width="2" stroke-dasharray="6,3"/>
    <text x="500" y="155" font-size="10" font-weight="700" fill="var(--accent)" font-family="'JetBrains Mono', ui-monospace, SFMono-Regular, Menlo, monospace" letter-spacing="0.5" text-anchor="middle">TODAY</text>
  </g>

  <g id="workstream-1">
    <text x="60" y="200" font-size="12" font-weight="700" fill="var(--ink)" font-family="'Inter', -apple-system, BlinkMacSystemFont, 'Helvetica Neue', Helvetica, Arial, sans-serif">{Workstream 1}</text>
    <rect x="280" y="180" width="1060" height="50" rx="4" fill="var(--card)" stroke="var(--border)"/>
    <rect x="290" y="190" width="320" height="30" rx="4" fill="var(--card-accent)" stroke="var(--teal)" stroke-width="1.5"/>
    <text x="450" y="210" font-size="11" font-weight="700" fill="var(--teal)" text-anchor="middle" font-family="'Inter', -apple-system, BlinkMacSystemFont, 'Helvetica Neue', Helvetica, Arial, sans-serif">{Initiative A — in progress}</text>
    <polygon points="630,205 645,193 660,205 645,217" fill="var(--accent)"/>
    <text x="645" y="183" font-size="9" fill="var(--ink)" text-anchor="middle" font-family="'Inter', -apple-system, BlinkMacSystemFont, 'Helvetica Neue', Helvetica, Arial, sans-serif">{Milestone date}</text>
    <rect x="700" y="190" width="280" height="30" rx="4" fill="var(--card-accent)" stroke="var(--accent)" stroke-width="1.5" stroke-dasharray="4,3"/>
    <text x="840" y="210" font-size="11" font-weight="700" fill="var(--accent)" text-anchor="middle" font-family="'Inter', -apple-system, BlinkMacSystemFont, 'Helvetica Neue', Helvetica, Arial, sans-serif">{Initiative B — at risk}</text>
  </g>

  <g id="workstream-2">
    <text x="60" y="270" font-size="12" font-weight="700" fill="var(--ink)" font-family="'Inter', -apple-system, BlinkMacSystemFont, 'Helvetica Neue', Helvetica, Arial, sans-serif">{Workstream 2}</text>
    <rect x="280" y="250" width="1060" height="50" rx="4" fill="var(--card)" stroke="var(--border)"/>
    <rect x="380" y="260" width="380" height="30" rx="4" fill="var(--card-accent)" stroke="var(--teal)" stroke-width="1.5"/>
    <text x="570" y="280" font-size="11" font-weight="700" fill="var(--teal)" text-anchor="middle" font-family="'Inter', -apple-system, BlinkMacSystemFont, 'Helvetica Neue', Helvetica, Arial, sans-serif">{Initiative C}</text>
  </g>

  <g id="workstream-3">
    <text x="60" y="340" font-size="12" font-weight="700" fill="var(--ink)" font-family="'Inter', -apple-system, BlinkMacSystemFont, 'Helvetica Neue', Helvetica, Arial, sans-serif">{Workstream 3}</text>
    <rect x="280" y="320" width="1060" height="50" rx="4" fill="var(--card)" stroke="var(--border)"/>
    <rect x="800" y="330" width="400" height="30" rx="4" fill="var(--card-accent)" stroke="var(--teal)" stroke-width="1.5"/>
    <text x="1000" y="350" font-size="11" font-weight="700" fill="var(--teal)" text-anchor="middle" font-family="'Inter', -apple-system, BlinkMacSystemFont, 'Helvetica Neue', Helvetica, Arial, sans-serif">{Initiative D}</text>
  </g>

  <g id="legend">
    <rect x="60" y="680" width="1280" height="100" rx="4" fill="var(--card)" stroke="var(--border)"/>
    <text x="80" y="700" font-size="11" font-weight="700" fill="var(--ink)" letter-spacing="1.5" font-family="'JetBrains Mono', ui-monospace, SFMono-Regular, Menlo, monospace">LEGEND</text>
    <rect x="80" y="712" width="40" height="12" rx="2" fill="var(--card-accent)" stroke="var(--teal)" stroke-width="1.5"/>
    <text x="130" y="722" font-size="11" fill="var(--body)" font-family="'Inter', -apple-system, BlinkMacSystemFont, 'Helvetica Neue', Helvetica, Arial, sans-serif">Committed initiative</text>
    <rect x="280" y="712" width="40" height="12" rx="2" fill="var(--card-accent)" stroke="var(--accent)" stroke-width="1.5" stroke-dasharray="4,3"/>
    <text x="330" y="722" font-size="11" fill="var(--body)" font-family="'Inter', -apple-system, BlinkMacSystemFont, 'Helvetica Neue', Helvetica, Arial, sans-serif">At risk / conditional</text>
    <polygon points="495,718 510,706 525,718 510,730" fill="var(--accent)"/>
    <text x="540" y="722" font-size="11" fill="var(--body)" font-family="'Inter', -apple-system, BlinkMacSystemFont, 'Helvetica Neue', Helvetica, Arial, sans-serif">Milestone (filled diamond)</text>
    <line x1="730" y1="712" x2="730" y2="724" stroke="var(--accent)" stroke-width="2" stroke-dasharray="3,2"/>
    <text x="745" y="722" font-size="11" fill="var(--body)" font-family="'Inter', -apple-system, BlinkMacSystemFont, 'Helvetica Neue', Helvetica, Arial, sans-serif">Today marker</text>
    <text x="80" y="752" font-size="10" font-style="italic" fill="var(--secondary)" font-family="'Inter', -apple-system, BlinkMacSystemFont, 'Helvetica Neue', Helvetica, Arial, sans-serif">Note: precision decreases with horizon. Q4 commits should be directional, not date-specific.</text>
  </g>
</svg>
