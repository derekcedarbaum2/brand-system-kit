<?xml version="1.0" encoding="UTF-8"?>
<!--
  TEMPLATE: Supply Chain Map
  Required fonts: JetBrains Mono (500-700), Inter (400-700). {{COMPANY}} brand.
  Tiers (left to right): Tier-N suppliers → Tier-1 suppliers → Manufacturer → Distribution → Customer.
-->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1400 800">
<style>:root{
  --ink: #161a19;
  --body: #353b3a;
  --secondary: #5c6463;
  --dim: #6e7574;
  --accent: #1f6e7a;
  --accent-light: #cfe0e2;
  --accent-2: #3e5c8a;
  --teal: #2a7d8a;
  --warm: #8a6d1f;
  --positive: #2e7d4f;
  --emphasis: #9a2d2d;
  --bg: #fbfaf7;
  --card: #f0eee8;
  --card-accent: #e6eef0;
  --border: #e3e0d8;
}</style>
  <title>{Product} — Supply Chain Map</title>
  <desc>Multi-tier supply chain from raw suppliers to end customer. Identifies dependencies and risk concentrations.</desc>
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="9" markerHeight="9" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="var(--body)"/>
    </marker>
  </defs>

  <g id="background"><rect x="0" y="0" width="1400" height="800" fill="var(--bg)"/></g>

  <g id="header">
    <text x="60" y="56" font-size="26" font-weight="700" fill="var(--ink)" font-family="'JetBrains Mono', ui-monospace, SFMono-Regular, Menlo, monospace" letter-spacing="0.8">{PRODUCT} SUPPLY CHAIN</text>
    <text x="60" y="82" font-size="13" fill="var(--secondary)" font-family="'Inter', -apple-system, BlinkMacSystemFont, 'Helvetica Neue', Helvetica, Arial, sans-serif">Tiers flow left → right. Red border = single-source / risk-concentrated nodes.</text>
  </g>

  <g id="tier-headers">
    <text x="150" y="140" font-size="10" font-weight="700" fill="var(--secondary)" letter-spacing="1.5" text-anchor="middle" font-family="'JetBrains Mono', ui-monospace, SFMono-Regular, Menlo, monospace">TIER 3 (RAW)</text>
    <text x="430" y="140" font-size="10" font-weight="700" fill="var(--secondary)" letter-spacing="1.5" text-anchor="middle" font-family="'JetBrains Mono', ui-monospace, SFMono-Regular, Menlo, monospace">TIER 2</text>
    <text x="700" y="140" font-size="10" font-weight="700" fill="var(--secondary)" letter-spacing="1.5" text-anchor="middle" font-family="'JetBrains Mono', ui-monospace, SFMono-Regular, Menlo, monospace">TIER 1</text>
    <text x="970" y="140" font-size="10" font-weight="700" fill="var(--secondary)" letter-spacing="1.5" text-anchor="middle" font-family="'JetBrains Mono', ui-monospace, SFMono-Regular, Menlo, monospace">MANUFACTURER</text>
    <text x="1240" y="140" font-size="10" font-weight="700" fill="var(--secondary)" letter-spacing="1.5" text-anchor="middle" font-family="'JetBrains Mono', ui-monospace, SFMono-Regular, Menlo, monospace">DISTRIBUTION</text>
  </g>

  <g id="tier-3-nodes">
    <rect x="60" y="170" width="180" height="60" rx="4" fill="var(--card)" stroke="var(--dim)"/>
    <text x="150" y="196" font-size="12" font-weight="700" fill="var(--ink)" text-anchor="middle" font-family="'Inter', -apple-system, BlinkMacSystemFont, 'Helvetica Neue', Helvetica, Arial, sans-serif">{Raw 1}</text>
    <text x="150" y="216" font-size="9" fill="var(--secondary)" text-anchor="middle" font-family="'Inter', -apple-system, BlinkMacSystemFont, 'Helvetica Neue', Helvetica, Arial, sans-serif">{material / region}</text>
    <rect x="60" y="250" width="180" height="60" rx="4" fill="var(--card)" stroke="var(--dim)"/>
    <text x="150" y="276" font-size="12" font-weight="700" fill="var(--ink)" text-anchor="middle" font-family="'Inter', -apple-system, BlinkMacSystemFont, 'Helvetica Neue', Helvetica, Arial, sans-serif">{Raw 2}</text>
    <rect x="60" y="330" width="180" height="60" rx="4" fill="var(--card-accent)" stroke="var(--accent)" stroke-width="2"/>
    <text x="150" y="356" font-size="12" font-weight="700" fill="var(--ink)" text-anchor="middle" font-family="'Inter', -apple-system, BlinkMacSystemFont, 'Helvetica Neue', Helvetica, Arial, sans-serif">{Raw 3 — single source}</text>
    <text x="150" y="376" font-size="9" font-weight="700" fill="var(--accent)" text-anchor="middle" font-family="'Inter', -apple-system, BlinkMacSystemFont, 'Helvetica Neue', Helvetica, Arial, sans-serif">RISK</text>
    <rect x="60" y="410" width="180" height="60" rx="4" fill="var(--card)" stroke="var(--dim)"/>
    <text x="150" y="436" font-size="12" font-weight="700" fill="var(--ink)" text-anchor="middle" font-family="'Inter', -apple-system, BlinkMacSystemFont, 'Helvetica Neue', Helvetica, Arial, sans-serif">{Raw 4}</text>
  </g>

  <g id="tier-2-nodes">
    <rect x="340" y="200" width="180" height="80" rx="4" fill="var(--card)" stroke="var(--dim)"/>
    <text x="430" y="226" font-size="13" font-weight="700" fill="var(--ink)" text-anchor="middle" font-family="'Inter', -apple-system, BlinkMacSystemFont, 'Helvetica Neue', Helvetica, Arial, sans-serif">{Tier-2 Supplier A}</text>
    <text x="430" y="248" font-size="10" fill="var(--secondary)" text-anchor="middle" font-family="'Inter', -apple-system, BlinkMacSystemFont, 'Helvetica Neue', Helvetica, Arial, sans-serif">{component / region}</text>
    <text x="430" y="266" font-size="9" font-style="italic" fill="var(--secondary)" text-anchor="middle" font-family="'Inter', -apple-system, BlinkMacSystemFont, 'Helvetica Neue', Helvetica, Arial, sans-serif">{lead time}</text>

    <rect x="340" y="320" width="180" height="80" rx="4" fill="var(--card)" stroke="var(--dim)"/>
    <text x="430" y="346" font-size="13" font-weight="700" fill="var(--ink)" text-anchor="middle" font-family="'Inter', -apple-system, BlinkMacSystemFont, 'Helvetica Neue', Helvetica, Arial, sans-serif">{Tier-2 Supplier B}</text>
  </g>

  <g id="tier-1-nodes">
    <rect x="610" y="200" width="180" height="80" rx="4" fill="var(--card-accent)" stroke="var(--teal)" stroke-width="1.5"/>
    <text x="700" y="226" font-size="13" font-weight="700" fill="var(--ink)" text-anchor="middle" font-family="'Inter', -apple-system, BlinkMacSystemFont, 'Helvetica Neue', Helvetica, Arial, sans-serif">{Tier-1 Supplier X}</text>
    <text x="700" y="248" font-size="10" fill="var(--secondary)" text-anchor="middle" font-family="'Inter', -apple-system, BlinkMacSystemFont, 'Helvetica Neue', Helvetica, Arial, sans-serif">{subassembly}</text>

    <rect x="610" y="320" width="180" height="80" rx="4" fill="var(--card-accent)" stroke="var(--teal)" stroke-width="1.5"/>
    <text x="700" y="346" font-size="13" font-weight="700" fill="var(--ink)" text-anchor="middle" font-family="'Inter', -apple-system, BlinkMacSystemFont, 'Helvetica Neue', Helvetica, Arial, sans-serif">{Tier-1 Supplier Y}</text>
  </g>

  <g id="manufacturer">
    <rect x="880" y="240" width="200" height="120" rx="6" fill="var(--card-accent)" stroke="var(--accent)" stroke-width="2.5"/>
    <text x="980" y="270" font-size="14" font-weight="700" fill="var(--accent)" text-anchor="middle" font-family="'JetBrains Mono', ui-monospace, SFMono-Regular, Menlo, monospace" letter-spacing="0.5">MANUFACTURER</text>
    <text x="980" y="296" font-size="14" font-weight="700" fill="var(--ink)" text-anchor="middle" font-family="'Inter', -apple-system, BlinkMacSystemFont, 'Helvetica Neue', Helvetica, Arial, sans-serif">{Plant location}</text>
    <text x="980" y="318" font-size="11" fill="var(--secondary)" text-anchor="middle" font-family="'Inter', -apple-system, BlinkMacSystemFont, 'Helvetica Neue', Helvetica, Arial, sans-serif">{capacity / units/yr}</text>
    <text x="980" y="340" font-size="9" font-style="italic" fill="var(--secondary)" text-anchor="middle" font-family="'Inter', -apple-system, BlinkMacSystemFont, 'Helvetica Neue', Helvetica, Arial, sans-serif">{certifications}</text>
  </g>

  <g id="distribution">
    <rect x="1180" y="200" width="180" height="80" rx="4" fill="var(--card)" stroke="var(--accent)" stroke-width="1.5"/>
    <text x="1270" y="232" font-size="13" font-weight="700" fill="var(--ink)" text-anchor="middle" font-family="'Inter', -apple-system, BlinkMacSystemFont, 'Helvetica Neue', Helvetica, Arial, sans-serif">{Distributor 1}</text>

    <rect x="1180" y="320" width="180" height="80" rx="4" fill="var(--card)" stroke="var(--accent)" stroke-width="1.5"/>
    <text x="1270" y="352" font-size="13" font-weight="700" fill="var(--ink)" text-anchor="middle" font-family="'Inter', -apple-system, BlinkMacSystemFont, 'Helvetica Neue', Helvetica, Arial, sans-serif">{Distributor 2}</text>
  </g>

  <g id="connectors" stroke="var(--secondary)" stroke-width="1.5">
    <line x1="240" y1="200" x2="340" y2="240" marker-end="url(#arrow)"/>
    <line x1="240" y1="280" x2="340" y2="240" marker-end="url(#arrow)"/>
    <line x1="240" y1="360" x2="340" y2="360" marker-end="url(#arrow)" stroke="var(--accent)"/>
    <line x1="240" y1="440" x2="340" y2="360" marker-end="url(#arrow)"/>
    <line x1="520" y1="240" x2="610" y2="240" marker-end="url(#arrow)"/>
    <line x1="520" y1="360" x2="610" y2="360" marker-end="url(#arrow)"/>
    <line x1="790" y1="240" x2="880" y2="280" marker-end="url(#arrow)"/>
    <line x1="790" y1="360" x2="880" y2="320" marker-end="url(#arrow)"/>
    <line x1="1080" y1="280" x2="1180" y2="240" marker-end="url(#arrow)"/>
    <line x1="1080" y1="320" x2="1180" y2="360" marker-end="url(#arrow)"/>
  </g>

  <g id="footer">
    <rect x="60" y="600" width="1280" height="120" rx="4" fill="var(--card)" stroke="var(--border)"/>
    <text x="80" y="624" font-size="11" font-weight="700" fill="var(--ink)" letter-spacing="1.5" font-family="'JetBrains Mono', ui-monospace, SFMono-Regular, Menlo, monospace">RISK INDICATORS</text>
    <text x="80" y="650" font-size="11" fill="var(--body)" font-family="'Inter', -apple-system, BlinkMacSystemFont, 'Helvetica Neue', Helvetica, Arial, sans-serif">• Single-source nodes (red border) = highest concentration risk; identify second sources or buffer inventory</text>
    <text x="80" y="672" font-size="11" fill="var(--body)" font-family="'Inter', -apple-system, BlinkMacSystemFont, 'Helvetica Neue', Helvetica, Arial, sans-serif">• Long lead-time arrows = critical-path constraints during ramp</text>
    <text x="80" y="694" font-size="11" fill="var(--body)" font-family="'Inter', -apple-system, BlinkMacSystemFont, 'Helvetica Neue', Helvetica, Arial, sans-serif">• Geographic clustering at Tier 2-3 = exposure to regional shocks (geopolitics, weather, embargo)</text>
  </g>
</svg>
