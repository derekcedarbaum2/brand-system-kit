<?xml version="1.0" encoding="UTF-8"?>
<!--
  TEMPLATE: Tech Radar (ThoughtWorks-style)
  Required fonts: JetBrains Mono (500-700), Inter (400-700). {{COMPANY}} brand.
  Four concentric rings: Adopt (innermost) → Trial → Assess → Hold (outermost).
  Four quadrants for category split (e.g., Languages / Tools / Platforms / Techniques).
  Items placed as labeled dots within their ring + quadrant.
-->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 1100">
<style>:root{
  --ink: #161a19;
  --body: #353b3a;
  --secondary: #5c6463;
  --dim: #6e7574;
  --accent: #1f6e7a;
  --accent-light: #cfe0e2;
  --accent-2: #3e5c8a;
  --teal: #2a7d8a;
  --warm: #8a6d1f;
  --positive: #2e7d4f;
  --emphasis: #9a2d2d;
  --bg: #fbfaf7;
  --card: #f0eee8;
  --card-accent: #e6eef0;
  --border: #e3e0d8;
}</style>
  <title>{Org} — Tech Radar</title>
  <desc>Tech radar with four rings (Adopt / Trial / Assess / Hold) and four quadrants. Items placed as dots; closer to center = higher confidence.</desc>

  <g id="background"><rect x="0" y="0" width="1200" height="1100" fill="var(--bg)"/></g>

  <g id="header">
    <text x="60" y="56" font-size="26" font-weight="700" fill="var(--ink)" font-family="'JetBrains Mono', ui-monospace, SFMono-Regular, Menlo, monospace" letter-spacing="0.8">{ORG} TECH RADAR</text>
    <text x="60" y="82" font-size="13" fill="var(--secondary)" font-family="'Inter', -apple-system, BlinkMacSystemFont, 'Helvetica Neue', Helvetica, Arial, sans-serif">As of {date}. Closer to center = higher confidence; outer ring = avoid.</text>
  </g>

  <g id="radar-rings">
    <circle cx="600" cy="540" r="400" fill="var(--card)" stroke="var(--dim)" stroke-width="1"/>
    <circle cx="600" cy="540" r="300" fill="var(--card)" stroke="var(--accent)" stroke-width="1"/>
    <circle cx="600" cy="540" r="200" fill="var(--card-accent)" stroke="var(--teal)" stroke-width="1.5"/>
    <circle cx="600" cy="540" r="100" fill="var(--card-accent)" stroke="var(--accent)" stroke-width="2"/>

    <text x="600" y="148" font-size="10" font-weight="700" fill="var(--secondary)" letter-spacing="1.5" text-anchor="middle" font-family="'JetBrains Mono', ui-monospace, SFMono-Regular, Menlo, monospace">HOLD</text>
    <text x="600" y="248" font-size="10" font-weight="700" fill="var(--accent)" letter-spacing="1.5" text-anchor="middle" font-family="'JetBrains Mono', ui-monospace, SFMono-Regular, Menlo, monospace">ASSESS</text>
    <text x="600" y="348" font-size="10" font-weight="700" fill="var(--teal)" letter-spacing="1.5" text-anchor="middle" font-family="'JetBrains Mono', ui-monospace, SFMono-Regular, Menlo, monospace">TRIAL</text>
    <text x="600" y="448" font-size="10" font-weight="700" fill="var(--accent)" letter-spacing="1.5" text-anchor="middle" font-family="'JetBrains Mono', ui-monospace, SFMono-Regular, Menlo, monospace">ADOPT</text>
  </g>

  <g id="quadrant-axes">
    <line x1="600" y1="140" x2="600" y2="940" stroke="var(--ink)" stroke-width="1.5"/>
    <line x1="200" y1="540" x2="1000" y2="540" stroke="var(--ink)" stroke-width="1.5"/>
  </g>

  <g id="quadrant-labels">
    <text x="280" y="180" font-size="13" font-weight="700" fill="var(--ink)" letter-spacing="1.5" font-family="'JetBrains Mono', ui-monospace, SFMono-Regular, Menlo, monospace">{LANGUAGES &amp; FRAMEWORKS}</text>
    <text x="920" y="180" font-size="13" font-weight="700" fill="var(--ink)" letter-spacing="1.5" text-anchor="end" font-family="'JetBrains Mono', ui-monospace, SFMono-Regular, Menlo, monospace">{TOOLS}</text>
    <text x="280" y="920" font-size="13" font-weight="700" fill="var(--ink)" letter-spacing="1.5" font-family="'JetBrains Mono', ui-monospace, SFMono-Regular, Menlo, monospace">{TECHNIQUES}</text>
    <text x="920" y="920" font-size="13" font-weight="700" fill="var(--ink)" letter-spacing="1.5" text-anchor="end" font-family="'JetBrains Mono', ui-monospace, SFMono-Regular, Menlo, monospace">{PLATFORMS}</text>
  </g>

  <g id="items">
    <circle cx="540" cy="500" r="8" fill="var(--accent)"/>
    <text x="555" y="504" font-size="11" font-weight="700" fill="var(--ink)" font-family="'Inter', -apple-system, BlinkMacSystemFont, 'Helvetica Neue', Helvetica, Arial, sans-serif">{1. Tech in Adopt}</text>

    <circle cx="500" cy="430" r="8" fill="var(--teal)"/>
    <text x="430" y="424" font-size="11" font-weight="700" fill="var(--ink)" font-family="'Inter', -apple-system, BlinkMacSystemFont, 'Helvetica Neue', Helvetica, Arial, sans-serif">{2. Tech in Trial}</text>

    <circle cx="380" cy="350" r="8" fill="var(--accent)"/>
    <text x="290" y="346" font-size="11" font-weight="700" fill="var(--ink)" font-family="'Inter', -apple-system, BlinkMacSystemFont, 'Helvetica Neue', Helvetica, Arial, sans-serif">{3. Tech in Assess}</text>

    <circle cx="320" cy="220" r="8" fill="var(--secondary)"/>
    <text x="230" y="216" font-size="11" font-weight="700" fill="var(--ink)" font-family="'Inter', -apple-system, BlinkMacSystemFont, 'Helvetica Neue', Helvetica, Arial, sans-serif">{4. Tech in Hold}</text>

    <circle cx="660" cy="490" r="8" fill="var(--accent)"/>
    <text x="675" y="494" font-size="11" font-weight="700" fill="var(--ink)" font-family="'Inter', -apple-system, BlinkMacSystemFont, 'Helvetica Neue', Helvetica, Arial, sans-serif">{5. Tool in Adopt}</text>

    <circle cx="720" cy="600" r="8" fill="var(--teal)"/>
    <text x="735" y="604" font-size="11" font-weight="700" fill="var(--ink)" font-family="'Inter', -apple-system, BlinkMacSystemFont, 'Helvetica Neue', Helvetica, Arial, sans-serif">{6. Platform in Trial}</text>

    <circle cx="500" cy="650" r="8" fill="var(--teal)"/>
    <text x="380" y="654" font-size="11" font-weight="700" fill="var(--ink)" font-family="'Inter', -apple-system, BlinkMacSystemFont, 'Helvetica Neue', Helvetica, Arial, sans-serif">{7. Technique in Trial}</text>

    <circle cx="420" cy="780" r="8" fill="var(--accent)"/>
    <text x="290" y="784" font-size="11" font-weight="700" fill="var(--ink)" font-family="'Inter', -apple-system, BlinkMacSystemFont, 'Helvetica Neue', Helvetica, Arial, sans-serif">{8. Technique in Assess}</text>

    <circle cx="800" cy="800" r="8" fill="var(--secondary)"/>
    <text x="815" y="804" font-size="11" font-weight="700" fill="var(--ink)" font-family="'Inter', -apple-system, BlinkMacSystemFont, 'Helvetica Neue', Helvetica, Arial, sans-serif">{9. Platform in Hold}</text>
  </g>

  <g id="legend">
    <rect x="60" y="990" width="1080" height="80" rx="4" fill="var(--card)" stroke="var(--border)"/>
    <text x="80" y="1010" font-size="11" font-weight="700" fill="var(--ink)" letter-spacing="1.5" font-family="'JetBrains Mono', ui-monospace, SFMono-Regular, Menlo, monospace">RING DEFINITIONS</text>
    <circle cx="92" cy="1028" r="6" fill="var(--accent)"/>
    <text x="108" y="1032" font-size="11" font-weight="700" fill="var(--ink)" font-family="'Inter', -apple-system, BlinkMacSystemFont, 'Helvetica Neue', Helvetica, Arial, sans-serif">ADOPT — proven, use freely</text>
    <circle cx="370" cy="1028" r="6" fill="var(--teal)"/>
    <text x="386" y="1032" font-size="11" font-weight="700" fill="var(--ink)" font-family="'Inter', -apple-system, BlinkMacSystemFont, 'Helvetica Neue', Helvetica, Arial, sans-serif">TRIAL — pilot for new projects</text>
    <circle cx="640" cy="1028" r="6" fill="var(--accent)"/>
    <text x="656" y="1032" font-size="11" font-weight="700" fill="var(--ink)" font-family="'Inter', -apple-system, BlinkMacSystemFont, 'Helvetica Neue', Helvetica, Arial, sans-serif">ASSESS — explore, no commit</text>
    <circle cx="900" cy="1028" r="6" fill="var(--secondary)"/>
    <text x="916" y="1032" font-size="11" font-weight="700" fill="var(--ink)" font-family="'Inter', -apple-system, BlinkMacSystemFont, 'Helvetica Neue', Helvetica, Arial, sans-serif">HOLD — avoid for new work</text>
    <text x="80" y="1056" font-size="10" font-style="italic" fill="var(--secondary)" font-family="'Inter', -apple-system, BlinkMacSystemFont, 'Helvetica Neue', Helvetica, Arial, sans-serif">Quadrants split categories (languages, tools, platforms, techniques). Numbered items map to a sidebar legend in the actual document.</text>
  </g>
</svg>
