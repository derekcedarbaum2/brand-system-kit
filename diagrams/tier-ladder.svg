<?xml version="1.0" encoding="UTF-8"?>
<!--
  TEMPLATE: Capability Tier Ladder
  Required Figma fonts: JetBrains Mono (700) for headlines/labels, Inter (400, 700) for body.
  Replace {Topic}, tier names, capability lists, and actor names with project-specific content.
  Default canvas: 1300 × 920. Add or remove tier groups as needed (3–6 tiers recommended).
-->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1300 920">
<style>:root{
  --ink: #161a19;
  --body: #353b3a;
  --secondary: #5c6463;
  --dim: #6e7574;
  --accent: #1f6e7a;
  --accent-light: #cfe0e2;
  --accent-2: #3e5c8a;
  --teal: #2a7d8a;
  --warm: #8a6d1f;
  --positive: #2e7d4f;
  --emphasis: #9a2d2d;
  --bg: #fbfaf7;
  --card: #f0eee8;
  --card-accent: #e6eef0;
  --border: #e3e0d8;
}</style>
  <title>{Topic} — Capability Tier Ladder</title>
  <desc>N actors mapped to N cumulative capability tiers. Each role inherits everything below it.</desc>

  <g id="background">
    <rect x="0" y="0" width="1300" height="920" fill="var(--bg)"/>
  </g>

  <g id="header">
    <text id="title" x="60" y="56" font-size="26" font-weight="700" fill="var(--ink)" font-family="'JetBrains Mono', ui-monospace, SFMono-Regular, Menlo, monospace" letter-spacing="0.8">CAPABILITY TIER LADDER</text>
    <text id="subtitle" x="60" y="82" font-size="13" fill="var(--secondary)" font-family="'Inter', -apple-system, BlinkMacSystemFont, 'Helvetica Neue', Helvetica, Arial, sans-serif">{Subtitle: source anchor, e.g., "PRD §X — N actors, N cumulative tiers"}</text>
  </g>

  <g id="column-headers">
    <text x="60" y="124" font-size="10" font-weight="700" fill="var(--secondary)" letter-spacing="1.5" font-family="'JetBrains Mono', ui-monospace, SFMono-Regular, Menlo, monospace">TIER</text>
    <text x="280" y="124" font-size="10" font-weight="700" fill="var(--secondary)" letter-spacing="1.5" font-family="'JetBrains Mono', ui-monospace, SFMono-Regular, Menlo, monospace">CAPABILITIES UNLOCKED AT THIS TIER</text>
    <text x="980" y="124" font-size="10" font-weight="700" fill="var(--secondary)" letter-spacing="1.5" font-family="'JetBrains Mono', ui-monospace, SFMono-Regular, Menlo, monospace">PRIMARY ACTOR</text>
  </g>

  <!-- TIER N (top, most capable) — primary actor (emphasis border) -->
  <g id="tier-N-top">
    <rect x="60" y="140" width="1180" height="120" rx="6" fill="var(--card)" stroke="var(--accent)" stroke-width="2"/>
    <text x="80" y="172" font-size="22" font-weight="700" fill="var(--accent)" font-family="'JetBrains Mono', ui-monospace, SFMono-Regular, Menlo, monospace">TN</text>
    <text x="80" y="194" font-size="13" font-weight="700" fill="var(--ink)" font-family="'JetBrains Mono', ui-monospace, SFMono-Regular, Menlo, monospace" letter-spacing="0.5">{TIER NAME}</text>
    <text x="80" y="212" font-size="10" fill="var(--secondary)" font-family="'Inter', -apple-system, BlinkMacSystemFont, 'Helvetica Neue', Helvetica, Arial, sans-serif">{One-line tier description}</text>
    <line x1="240" y1="155" x2="240" y2="245" stroke="var(--border)" stroke-width="1"/>
    <g id="tier-N-capabilities" font-family="'Inter', -apple-system, BlinkMacSystemFont, 'Helvetica Neue', Helvetica, Arial, sans-serif">
      <text x="280" y="172" font-size="12" fill="var(--body)">• {Capability 1 unlocked at this tier}</text>
      <text x="280" y="192" font-size="12" fill="var(--body)">• {Capability 2}</text>
      <text x="280" y="212" font-size="12" fill="var(--body)">• {Capability 3}</text>
      <text x="280" y="240" font-size="10" font-style="italic" fill="var(--secondary)">+ everything in lower tiers</text>
    </g>
    <g id="tier-N-actor-card">
      <rect x="980" y="160" width="240" height="80" rx="6" fill="var(--bg)" stroke="var(--accent)" stroke-width="2"/>
      <text x="1100" y="186" font-size="14" font-weight="700" fill="var(--ink)" text-anchor="middle" font-family="'Inter', -apple-system, BlinkMacSystemFont, 'Helvetica Neue', Helvetica, Arial, sans-serif">{Actor Name}</text>
      <text x="1100" y="206" font-size="10" fill="var(--accent)" text-anchor="middle" font-family="'JetBrains Mono', ui-monospace, SFMono-Regular, Menlo, monospace" letter-spacing="0.5" font-weight="700">PRIMARY • {ROLE NOTE}</text>
      <text x="1100" y="224" font-size="10" fill="var(--secondary)" text-anchor="middle" font-family="'Inter', -apple-system, BlinkMacSystemFont, 'Helvetica Neue', Helvetica, Arial, sans-serif">{One-line role detail}</text>
    </g>
  </g>

  <!-- Add additional tiers below by duplicating the above group, decrementing tier number, and shifting y by ~140px each. -->
  <!-- Use stroke="#3e5c8a" for primary actors, stroke="#a6a6a6" for secondary actors. -->
  <!-- Tier band height: 100–140 px depending on capability list length. -->

  <g id="footer-caption">
    <rect x="60" y="850" width="1180" height="50" rx="4" fill="var(--card)" stroke="var(--accent)" stroke-width="1"/>
    <text x="80" y="872" font-size="11" font-weight="700" fill="var(--ink)" letter-spacing="1.5" font-family="'JetBrains Mono', ui-monospace, SFMono-Regular, Menlo, monospace">HOW TO READ</text>
    <text x="80" y="890" font-size="11" fill="var(--body)" font-family="'Inter', -apple-system, BlinkMacSystemFont, 'Helvetica Neue', Helvetica, Arial, sans-serif">Each actor is shown once at their highest tier. Inheritance is cumulative — top tier can do everything in lower tiers. Red border = primary actor; gray = secondary.</text>
  </g>
</svg>
